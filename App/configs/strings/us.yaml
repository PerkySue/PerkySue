header_tips:
  startup_message: Tip · Place your cursor in Word, Gmail, Slack… then press Alt+T
  tips:
  - Tip · Press Alt+Q or click the sidebar avatar to stop recording manually
  - Tip · Alt+T is free forever — fast transcription, no LLM needed
  - Tip · Select any text, press Alt+I, and say what to change
  - Tip · Press Alt+M anywhere to dictate a full email from scratch
  - 'Alt+A Pro: keeps the thread in chat — Alt+A Free: one question at a time'
  - Tip · Ambient noise prevents auto-stop? Press Alt+Q to stop
  - Tip · Select a paragraph → Alt+P — fix tone and grammar in one shot
  - 'Tip · Alt+C in your terminal: describe what you need in plain words'
  - 'Tip · Alt+L: select any text and ask to translate into any language'
  - 'Tip · Alt+D: dictate a direct message for WhatsApp, Slack, Discord, SMS'
  - 'Tip · Alt+X: create a post or reply for LinkedIn, X, YouTube, Reddit'
  - Tip · Paste meeting notes, select them, Alt+S for a concise summary
  - Tip · Select sloppy text, press Alt+I, say 'make this shorter' — done
  - Tip · Alt+V to Alt+N = your own custom prompts. Edit in Prompt Modes
  - Tip · Create a custom prompt to reply to comments in your brand's tone
  - Tip · Tired of rewriting the same AI prompts? Make a custom prompt generator
  - 'Tip · Custom prompt idea: Turn notes into a LinkedIn post with a hook'
  - Tip · Use custom prompts to generate formatted Kling/Runway video prompts
  - 'Tip · Custom prompt idea: Extract action items and deadlines from text'
  - 'Tip · Alt+H: ask me anything about PerkySue on the Help Tab'
  - Pro · If Smart Focus didn't paste, copy your output from the console tab
  - Tip · Stop the Listening step by clicking the avatar or pressing Alt+Q
  - Tip · Switch apps while PerkySue thinks — result lands where you started
  - 'Tip · Smart Focus: press, move on, result appears where you triggered it'
  - Tip · CPU? Use Whisper small (fast) or medium (accurate). ⚙️ → STT Model
  - Tip · Ambient noise? Recording won't auto-stop — Alt+Q or click the avatar
  - Tip · Edit any mode's prompt in Pro Prompt Modes — make PerkySue yours
  - Tip · Whisper gets a word wrong? Add it to STT Keywords in Prompt Modes
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
