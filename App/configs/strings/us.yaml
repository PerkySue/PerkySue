    footer: Runs locally — your text stays on your machine.
  hero:
    title: PerkySue
    tagline: Voice-to-text with AI superpowers. 100% local. 100% private.
    subtitle: Press a hotkey, speak, and polished text appears wherever your cursor is — in any app, any window, any text field. No cloud. No account. No data leaves your machine.
  why_exists:
    section_title: Why PerkySue exists
    line_1: Every other dictation tool solves half the problem.
    line_2: They turn your voice into words — but they don't think with you.
    line_3: You still copy text into a chatbot, wait, then copy the answer back. That's several steps for something that should be one, and your words just travelled to a server you don't control.
    line_4: PerkySue is the whole pipeline in a single hotkey.
    line_5: Speech recognition, local LLM transformation, and text injection — in one shot, in any app, with nothing leaving your machine.
    line_6: Voice is not neutral data — it's biometric.
    line_7: It carries your accent, your cadence, your emotional state. Cloud dictation tools capture it, transmit it, and retain it under terms most people never read. It gets used to train models and is shared with infrastructure partners.
    line_8: PerkySue captures audio in RAM, processes it locally, and discards it immediately. Nothing is stored, logged, or transmitted.
    line_9: Your voice stays yours.
  how_it_works:
    section_title: How It Works
    step1_title: Press a hotkey
    step1_description: 'Place your cursor in any app where you usually type (Word, Gmail, Slack, VS Code…) and press:'
    step2_title: Speak naturally
    step2_description: PerkySue listens until you stop talking. Ambient noise can prevent auto-stop — press Alt+Q (global default) or Esc when this app is focused, or click the profile picture.
    step3_title: Text appears where you triggered it
    step3_description: PerkySue locks onto your cursor and active window at the moment you press the hotkey.
    step4_title: Keep working while it thinks
    step4_description: Switch tabs, type somewhere else. Smart Focus injects the result where you started.
  features:
    section_title: What People Use It For
    transcribe:
      card_title: 🎙️ Transcribe — free, forever
      badge: Alt+T
      description: Speak, and the raw transcript appears at your cursor. Works on any machine — choose Whisper models from tiny (old hardware, 4 GB RAM) to large-v3 (studio-grade on modern GPUs). No LLM required, no subscription, no word limit.
    improve:
      card_title: ✏️ Improve — rewrite what you select
      badge: Alt+I
      description: You're drafting a document and one paragraph feels flat — the idea is there but the writing isn't landing. Select it, press Alt+I, and say "make this punchier and cut it in half". PerkySue reads your selection and your instruction simultaneously. The rewritten paragraph replaces your original, in place, without you leaving the app.
      prompt: 🎤  "make this more engaging, the current version is too dry"
      result: ✅  Your selection is replaced with the improved version.
    professional:
      card_title: 💼 Professional — fix tone and errors in one step
      badge: Alt+P
      description: You've written two paragraphs that mix casual phrasing with a few typos. Select them, press Alt+P, and say "clean this up, I need it for a board presentation". The LLM rewrites for formality and fixes errors — your selection is replaced, no clipboard gymnastics needed.
      prompt: 🎤  "this needs to sound polished, fix the grammar too"
      result: ✅  Your selection is replaced with a formal, corrected version.
  use_cases:
    section_title: More voice modes in action
    intro: Each mode works as a voice prompt — no text selection needed. Press the hotkey, speak, and the result appears at your cursor.
    footer: All modes run entirely on your machine. No API call, no internet, no data leaving your device.
    items:
    - badge: Alt+M
      name: Email — say it, send it
      prompt: 🎤  "write an email to John to let him know PerkySue is ready to launch — mention we're targeting a soft release next week"
      result: ✅  A properly formatted, professional email appears at your cursor. PerkySue writes in the language you speak.
    - badge: Alt+D
      name: Direct Message — friendly, ready to paste
      prompt: 🎤  "tell grandpa not to forget the soy sauce"
      result: ✅  Hey Grandpa! Just a quick reminder — don't forget the soy sauce! Hope you have a great day!
    - badge: Alt+X
      name: Social Post — post or reply for any platform
      prompt: 🎤  "reply to this YouTube comment — tell them thanks and next video drops next week about the plugin system"
      result: ✅  Thanks so much! Really glad you enjoyed it. Next video drops next week — diving into the plugin system. Stay tuned!
    - badge: Alt+C
      name: Console — describe it, get the command
      prompt: 🎤  "find all Python files modified in the last 7 days"
      result: ✅  find . -name "*.py" -mtime -7 — ready to paste into your terminal.
    - badge: Alt+A
      name: Ask — local Q&A (Free in Chat, Pro at cursor)
      prompt: 🎤  "what's the difference between a mutex and a semaphore?"
      result: '✅  Pro: reply at your cursor with follow-up context. Free: reply in the Chat tab, one question at a time.'
    - badge: Alt+V/B/N
      name: Custom Prompts — your rules, your workflows
      prompt: 🎤  Three user-defined prompt slots you can edit in Prompt Modes.
      result: ✅  Turn speech into meeting notes, a specific writing style, structured output — whatever you need.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — fire and forget
    description: PerkySue locks onto your cursor position the moment you press the hotkey. While Whisper transcribes and the LLM generates, you're free to switch apps, keep typing, do your thing. The result lands where you triggered it — not where your cursor is now.
  voice_modes:
    section_title: Voice Modes
    modes:
    - hotkey: Alt+T
      name: Transcribe
      description: Fast transcription (no LLM)
      needs_llm: false
    - hotkey: Alt+I
      name: Improve
      description: Clean up and format text
      needs_llm: true
    - hotkey: Alt+P
      name: Professional
      description: Formal business rewrite
      needs_llm: true
    - hotkey: Alt+L
      name: Translate
      description: Translate to target language
      needs_llm: true
    - hotkey: Alt+C
      name: Console
      description: Extract a shell command
      needs_llm: true
    - hotkey: Alt+M
      name: Email
      description: Format as professional email
      needs_llm: true
    - hotkey: Alt+D
      name: Direct Message
      description: WhatsApp/Slack/Discord/SMS — tone adapts to relationship
      needs_llm: true
    - hotkey: Alt+X
      name: Social Post
      description: LinkedIn/X/YouTube/Reddit — post or reply
      needs_llm: true
    - hotkey: Alt+S
      name: Summarize
      description: Condense into key points
      needs_llm: true
    - hotkey: Alt+A
      name: Ask
      description: 'Free: ask in Chat — one question at a time. Pro: full Q&A at cursor with memory'
      needs_llm: true
    - hotkey: Alt+H
      name: Help
      description: Ask about PerkySue — app KB + your settings
      needs_llm: true
    - hotkey: Alt+G
      name: GenZ
      description: Casual, modern rewrite
      needs_llm: true
  competition:
    section_title: PerkySue vs. Competition
    items:
    - title: vs. built-in dictation
      examples: Windows, macOS, Google
      description: They transcribe words. PerkySue transcribes and thinks — 11 modes transform speech into emails, commands, translations, summaries.
    - title: vs. cloud dictation
      examples: Wispr Flow, Typeless
      description: Your audio never leaves your machine. No account, no internet, no word limits. Works on a plane or a USB stick.
    - title: vs. open-source tools
      examples: Amical, OpenWhispr
      description: They do STT + paste. PerkySue adds a local LLM pipeline, text selection + voice instructions, Smart Focus, and a GUI widget.
  privacy:
    section_title: Privacy
    items:
    - icon: 🔒
      title: No internet required
      description: Everything runs on your machine
    - icon: 🔇
      title: Audio never stored
      description: Captured in RAM, transcribed, immediately discarded
    - icon: 👤
      title: No account needed
      description: No sign-up, no tracking, no cookies
    - icon: 📂
      title: Open source
      description: Inspect every line of code yourself
  why_i_built_it:
    section_title: Why I built it
    paragraph_1: 'PerkySue began as a personal productivity tool — something I needed on my own machine every day, not a pitch deck first. After years of designing software architecture and conversational platforms, I wanted one pipeline: voice → local STT → local LLM → text injected where I already work.'
    paragraph_2: 'The code was co-developed with AI: this project involved sustained collaboration with AI programming assistants. The local pipeline is complex. Amusingly, PerkySue is assisting me today in coding her own code, without sending my voice or my data to the cloud.'
