  hero:
    title: PerkySue
    tagline: Dictée vocale avec IA. 100 % local. 100 % privé.
    subtitle: Appuie sur un raccourci, parle, et le texte apparaît là où se trouve ton curseur — dans n'importe quelle app, n'importe quelle fenêtre, n'importe quel champ de saisie. Pas de cloud. Pas de compte. Tes données ne quittent jamais ta machine.
  why_exists:
    section_title: Pourquoi PerkySue existe
    line_1: Tous les autres outils de dictée ne résolvent qu'une partie du problème.
    line_2: Ils convertissent ta voix en mots — mais ils ne pensent pas avec toi.
    line_3: Tu copies encore du texte dans un chatbot, tu attends, puis tu recopies la réponse. C'est plusieurs étapes pour quelque chose qui devrait n'en faire qu'une — et tes mots viennent de voyager vers un serveur que tu ne contrôles pas.
    line_4: PerkySue, c'est tout le pipeline en un seul raccourci.
    line_5: Reconnaissance vocale, transformation par LLM local, injection de texte — en une seule action, dans n'importe quelle app, sans rien envoyer à l'extérieur.
    line_6: La voix n'est pas une donnée neutre — c'est une donnée biométrique.
    line_7: Elle porte ton accent, ton rythme, ton état émotionnel. Les outils de dictée cloud la captent, la transmettent et la conservent selon des conditions que la plupart des gens ne lisent jamais. Elle sert à entraîner des modèles et est partagée avec des partenaires d'infrastructure.
    line_8: PerkySue capture l'audio en RAM, le traite localement et le supprime immédiatement. Rien n'est stocké, journalisé ou transmis.
    line_9: Ta voix reste à toi !
  how_it_works:
    section_title: Comment ça marche
    step1_title: Appuie sur un raccourci
    step1_description: 'Place ton curseur dans n''importe quelle app où tu tapes habituellement (Word, Gmail, Slack, VS Code…) et appuie sur :'
    step2_title: Parle naturellement
    step2_description: PerkySue enregistre jusqu'à ce que tu arrêtes de parler. Le bruit ambiant peut empêcher l'arrêt automatique — appuie sur Alt+Q (défaut global) ou Échap lorsque l'app est au premier plan, ou clique sur la photo de profil.
    step3_title: Le texte apparaît là où tu as déclenché
    step3_description: PerkySue verrouille ton curseur et la fenêtre active au moment où tu appuies sur le raccourci.
    step4_title: Continue à travailler pendant que ça traite
    step4_description: Change d'onglet, tape ailleurs. Smart Focus injecte le résultat là où tu as commencé.
  features:
    section_title: Ce que les utilisateurs en font
    transcribe:
      card_title: 🎙️ Transcrire — gratuit, pour toujours
      badge: Alt+T
      description: Parle, et la transcription brute apparaît à ton curseur. Fonctionne sur toutes les machines — choisis les modèles Whisper de tiny (ancien matériel, 4 Go RAM) à large-v3 (qualité studio sur GPU récents). Aucun LLM requis, aucun abonnement, aucune limite de mots.
    improve:
      card_title: ✏️ Améliorer — réécris ce que tu sélectionnes
      badge: Alt+I
      description: Tu rédiges un document et un paragraphe sonne creux — l'idée est là mais l'écriture ne passe pas. Sélectionne-le, appuie sur Alt+I et dis "rends ça plus percutant et coupe-le en deux". PerkySue lit ta sélection et ton instruction simultanément. Le paragraphe réécrit remplace l'original, sur place, sans quitter l'app.
      prompt: 🎤  "rends ça plus engageant, la version actuelle est trop sèche"
      result: ✅  Ta sélection est remplacée par la version améliorée.
    professional:
      card_title: 💼 Professionnel — corrige le ton et les erreurs en une étape
      badge: Alt+P
      description: Tu as écrit deux paragraphes qui mêlent un style décontracté à quelques fautes. Sélectionne-les, appuie sur Alt+P et dis "nettoie ça, c'est pour une présentation au conseil". Le LLM réécrit avec formalité et corrige les erreurs — ta sélection est remplacée, sans manipulation du presse-papier.
      prompt: 🎤  "il faut que ça sonne soigné, corrige aussi la grammaire"
      result: ✅  Ta sélection est remplacée par une version formelle et corrigée.
  use_cases:
    section_title: D'autres modes vocaux en action
    intro: Chaque mode fonctionne comme une commande vocale — aucune sélection de texte nécessaire. Appuie sur le raccourci, parle, et le résultat apparaît à ton curseur.
    footer: Tous les modes s'exécutent entièrement sur ton ordi. Pas de requête API, pas d'internet, pas de données qui quittent ta machine.
    items:
    - badge: Alt+M
      name: E-mail — dis-le, envoie-le
      prompt: 🎤  "écris un e-mail à John pour lui dire que PerkySue est prête à lancer — mentionne qu'on vise une sortie en douceur la semaine prochaine"
      result: ✅  Un e-mail professionnel et bien formaté apparaît à ton curseur. PerkySue écrit dans la langue que tu parles.
    - badge: Alt+D
      name: Message direct — amical, prêt à envoyer
      prompt: 🎤  "dis à mamie de ne pas oublier la sauce soja"
      result: ✅  Mamie ! Petit rappel — n'oublie pas la sauce soja ! Bonne journée !
    - badge: Alt+X
      name: Post réseaux sociaux — pour publier ou répondre
      prompt: 🎤  "réponds à ce commentaire YouTube — dis merci et que la prochaine vidéo sort la semaine prochaine sur le système de plugins"
      result: ✅  Merci beaucoup ! Vraiment content que ça t'ait plu. Prochaine vidéo la semaine prochaine — on plonge dans le système de plugins. À bientôt !
    - badge: Alt+C
      name: Console — décris la commande, obtiens la commande
      prompt: 🎤  "trouve tous les fichiers Python modifiés dans les 7 derniers jours"
      result: ✅  find . -name "*.py" -mtime -7 — prêt à coller dans ton terminal.
    - badge: Alt+A
      name: Ask — Q&R locale (gratuit dans le Chat, Pro au curseur)
      prompt: 🎤  "quelle est la différence entre un mutex et un sémaphore ?"
      result: '✅  Pro : réponse au curseur avec contexte. Gratuit : réponse dans l''onglet Chat, une question à la fois.'
    - badge: Alt+V/B/N
      name: Prompts personnalisés — tes règles, tes workflows
      prompt: 🎤  Trois emplacements de prompts personnalisables dans Prompt Modes.
      result: ✅  Transforme ta parole en notes de réunion, style d'écriture, sortie structurée — tout ce dont tu as besoin.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — déclenche et oublie
    description: PerkySue retient la position de ton curseur au moment où tu appuies sur le raccourci. Pendant que Whisper transcrit et que le LLM génère, tu peux changer d'app, taper ailleurs, faire autre chose. Le résultat atterrit là où tu as déclenché — pas là où ton curseur est maintenant.
