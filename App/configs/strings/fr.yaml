      needs_llm: true
  competition:
    section_title: PerkySue vs. Concurrence
    items:
    - title: vs. dictée intégrée
      examples: Windows, macOS, Google
      description: Ils transcrivent des mots. PerkySue transcrit et réfléchit — 11 modes transforment ta parole en e-mails, commandes, traductions, résumés.
    - title: vs. dictée cloud
      examples: Wispr Flow, Typeless
      description: Ta voix ne quitte jamais ton ordi. Pas de compte, pas d'internet, pas de limite de mots. PerkySue fonctionne en mode avion et sur une clé USB.
    - title: vs. outils open source
      examples: Amical, OpenWhispr
      description: Ils font STT + coller. PerkySue ajoute un pipeline LLM local, sélection de texte + instructions vocales, Smart Focus et un widget GUI.
  privacy:
    section_title: Confidentialité
    items:
    - icon: 🔒
      title: Pas d'internet requis
      description: Tout s'exécute sur ton ordi
    - icon: 🔇
      title: Audio jamais stocké
      description: Capturé en RAM, transcrit, supprimé immédiatement
    - icon: 👤
      title: Pas de compte nécessaire
      description: Pas d'inscription, pas de tracking, pas de cookies
    - icon: 📂
      title: Open source
      description: Inspecte chaque ligne de code toi-même
  why_i_built_it:
    section_title: Pourquoi avoir créé PerkySue?
    paragraph_1: 'PerkySue a commencé comme un outil de productivité personnel — quelque chose dont j''avais besoin chaque jour, ce n''était pas du code écrit pour un pitch deck. Après avoir conçu pendant des années des apps et des plateformes conversationnelles, je voulais rassembler en un seul outil: voix → STT local → LLM local → texte injecté là où je travaille déjà.'
    paragraph_2: 'Le code a été co-développé avec l''IA : ce projet a impliqué une collaboration soutenue avec des assistants IA en programmation. Le pipeline local est complexe. De façon amusante, PerkySue m''assiste aujourd''hui pour coder son propre code, sans envoyer ma voix ou mes données dans le cloud.'
  links:
