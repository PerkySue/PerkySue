  quick_use_cases:
    section_title: Сценарии (быстро)
    voice_layer: 'Голосовой слой для ИИ: в любом поле чата ИИ нажми Alt+T → говори → Enter.'
    custom_prompts: 'Свои промпты: Alt+V/B/N = 3 слота — переиспользуемые сценарии с твоими правилами и тоном.'
    footer: Работает локально — твой текст остаётся на твоей машине.
  hero:
    title: PerkySue
    tagline: Голос в текст с AI-магией. 100% локально. 100% приватно.
    subtitle: Нажми хоткей, скажи — и текст появляется прямо под курсором, в любом приложении, окне или поле. Никакого облака. Никаких аккаунтов. Твои данные не покидают машину.
  why_exists:
    section_title: Зачем нужна PerkySue
    line_1: Все остальные инструменты диктовки решают только половину задачи.
    line_2: Они переводят голос в слова — но не думают вместе с тобой.
    line_3: Ты всё ещё копируешь текст в чатбот, ждёшь, потом копируешь ответ обратно. Несколько шагов там, где должен быть один — и твои слова уже уехали на чужой сервер.
    line_4: PerkySue — это весь пайплайн в одном хоткее.
    line_5: Распознавание речи, обработка локальным LLM, вставка текста — одним действием, в любом приложении, ничего не уходит наружу.
    line_6: Голос — не нейтральные данные, это биометрия.
    line_7: Он несёт твой акцент, ритм, эмоциональное состояние. Облачные инструменты диктовки захватывают его, передают и хранят на условиях, которые мало кто читает. Он идёт на обучение моделей и утекает к инфраструктурным партнёрам.
    line_8: PerkySue захватывает аудио в RAM, обрабатывает локально и сразу удаляет. Ничего не хранится, не логируется, не передаётся.
    line_9: Твой голос — твой!
  how_it_works:
    section_title: Как это работает
    step1_title: Нажми хоткей
    step1_description: 'Поставь курсор в любое приложение, где ты обычно пишешь (Word, Gmail, Slack, VS Code…) и нажми:'
    step2_title: Говори как обычно
    step2_description: PerkySue пишет, пока ты не замолчишь. Шум вокруг может помешать автостопу — жми Alt+Q (глобальный дефолт) или Esc когда приложение в фокусе, или кликни на аватар.
    step3_title: Текст появляется там, где ты нажал
    step3_description: PerkySue запоминает курсор и активное окно в момент нажатия хоткея.
    step4_title: Работай дальше, пока обрабатывается
    step4_description: Переключай вкладки, пиши в другом месте. Smart Focus вставит результат туда, откуда ты начал.
  features:
    section_title: Для чего это используют
    transcribe:
      card_title: 🎙️ Транскрипция — бесплатно, навсегда
      badge: Alt+T
      description: Говори — и сырая транскрипция появляется под курсором. Работает на любой машине — выбирай модели Whisper от tiny (старое железо, 4 ГБ RAM) до large-v3 (студийное качество на современных GPU). Никакого LLM, никакой подписки, никаких лимитов слов.
    improve:
      card_title: ✏️ Улучшить — переписать выделенное
      badge: Alt+I
      description: Пишешь документ, и один абзац не заходит — идея есть, но текст плоский. Выдели его, нажми Alt+I и скажи «сделай покороче и поживее». PerkySue одновременно читает твой выбор и твою инструкцию. Переписанный абзац заменяет оригинал прямо на месте, без выхода из приложения.
      prompt: 🎤  «сделай это поживее, текущая версия слишком сухая»
      result: ✅  Твой выбор заменён улучшенной версией.
    professional:
      card_title: 💼 Профессионально — тон и ошибки за один шаг
      badge: Alt+P
      description: Написал два абзаца, где небрежный стиль смешан с парой опечаток. Выдели, нажми Alt+P и скажи «почисти, это идёт на презентацию совету». LLM перепишет формально и исправит ошибки — твой выбор заменён, буфер обмена не нужен.
      prompt: 🎤  «нужно звучать солидно, грамматику тоже поправь»
      result: ✅  Твой выбор заменён формальной исправленной версией.
  use_cases:
    section_title: Другие голосовые режимы в деле
    intro: Каждый режим работает как голосовая команда — выделять текст не нужно. Нажми хоткей, скажи — результат появится под курсором.
    footer: Все режимы работают полностью на твоей машине. Никаких API-запросов, интернета, утечки данных.
    items:
    - badge: Alt+M
      name: Email — скажи, отправь
      prompt: 🎤  «напиши email Джону, что PerkySue готова к запуску — упомяни, что планируем мягкий релиз на следующей неделе»
      result: ✅  Готовый профессиональный email появляется под курсором. PerkySue пишет на том языке, на котором ты говоришь.
    - badge: Alt+D
      name: Личное сообщение — дружески, готово к отправке
      prompt: 🎤  «напиши бабушке, чтоб не забыла соевый соус»
      result: ✅  Бабуль! Напоминашка — не забудь соевый соус! Хорошего дня!
    - badge: Alt+X
      name: Соцсети — пост или ответ для любой платформы
      prompt: 🎤  «ответь на этот YouTube-комментарий — поблагодари и скажи, что следующее видео выйдет на следующей неделе про систему плагинов»
      result: ✅  Спасибо! Рад, что зашло. Следующее видео — на следующей неделе, разбираем систему плагинов. Не переключайся!
    - badge: Alt+C
      name: Консоль — опиши команду, получи команду
      prompt: 🎤  «найди все Python-файлы, изменённые за последние 7 дней»
      result: ✅  find . -name "*.py" -mtime -7 — готово к вставке в терминал.
    - badge: Alt+A
      name: Ask — Q&A с памятью разговора
      prompt: 🎤  «в чём разница между мьютексом и семафором?»
      result: ✅  Ответ вставляется под курсором. Задай уточняющий вопрос — модель помнит историю разговора.
    - badge: Alt+V/B/N
      name: Свои промпты — твои правила, твои воркфлоу
      prompt: 🎤  Три слота для своих промптов, редактируются в Промптах.
      result: ✅  Превращай речь в заметки митинга, нужный стиль письма, структурированный вывод — как тебе надо.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — запусти и забудь
    description: 'PerkySue запоминает позицию курсора в момент нажатия хоткея. Пока Whisper транскрибирует и LLM генерирует — ты свободен: переключай приложения, продолжай печатать. Результат появится там, откуда ты запустил — не там, где курсор сейчас.'
  voice_modes:
    section_title: Голосовые режимы
    modes:
    - hotkey: Alt+T
      name: Транскрипция
      description: Быстрая транскрипция (без LLM)
      needs_llm: false
    - hotkey: Alt+I
      name: Улучшить
      description: Почистить и переформатировать текст
      needs_llm: true
    - hotkey: Alt+P
      name: Профессионально
      description: Формальная деловая переработка
      needs_llm: true
    - hotkey: Alt+L
      name: Перевести
      description: Перевести на целевой язык
      needs_llm: true
    - hotkey: Alt+C
      name: Консоль
      description: Извлечь shell-команду
      needs_llm: true
    - hotkey: Alt+M
      name: Email
      description: Оформить как деловой email
      needs_llm: true
    - hotkey: Alt+D
      name: Личное сообщение
      description: WhatsApp/Slack/Discord/SMS — тон под отношения
      needs_llm: true
    - hotkey: Alt+X
      name: Пост в соцсети
      description: LinkedIn/X/YouTube/Reddit — пост или ответ
      needs_llm: true
    - hotkey: Alt+S
      name: Резюме
      description: Сжать до ключевых моментов
      needs_llm: true
    - hotkey: Alt+A
      name: Ask
      description: Задай вопрос — LLM ответит под курсором
      needs_llm: true
    - hotkey: Alt+H
      name: Помощь
      description: Вопросы о PerkySue — база знаний + твои настройки
      needs_llm: true
    - hotkey: Alt+G
      name: GenZ
      description: Небрежная переписка в актуальном стиле
      needs_llm: true
  competition:
    section_title: PerkySue vs. Конкуренты
    items:
    - title: vs. встроенная диктовка
      examples: Windows, macOS, Google
      description: Они транскрибируют слова. PerkySue транскрибирует и думает — 11 режимов превращают речь в email, команды, переводы, резюме.
    - title: vs. облачная диктовка
      examples: Wispr Flow, Typeless
      description: Аудио не покидает твою машину. Никаких аккаунтов, интернета, лимитов слов. Работает в самолёте и с флешки.
    - title: vs. опенсорс-инструменты
      examples: Amical, OpenWhispr
      description: Они делают STT + вставку. PerkySue добавляет локальный LLM-пайплайн, выделение текста + голосовые инструкции, Smart Focus и GUI-виджет.
  privacy:
    section_title: Приватность
    items:
    - icon: 🔒
      title: Интернет не нужен
      description: Всё работает на твоей машине
    - icon: 🔇
      title: Аудио не хранится
      description: Захвачено в RAM, транскрибировано, сразу удалено
    - icon: 👤
      title: Аккаунт не нужен
      description: Никакой регистрации, трекинга, куков
    - icon: 📂
      title: Открытый код
      description: Проверь каждую строчку кода сам
  why_i_built_it:
    section_title: Почему я это создал
    paragraph_1: 'PerkySue началась как личный инструмент продуктивности — то, что мне было нужно каждый день, а не питч-дек. После лет разработки архитектуры приложений и диалоговых платформ я хотел собрать всё в один пайплайн: голос → локальный STT → локальный LLM → текст вставлен там, где я уже работаю.'
    paragraph_2: 'Код создавался вместе с AI: этот проект строился в тесном сотрудничестве с AI-ассистентами. Локальный пайплайн сложный. Забавно, что сегодня PerkySue помогает мне писать её собственный код — не отправляя мой голос или данные в облако.'
  links:
    section_title: Ссылки
    items:
    - label: Репозиторий GitHub
      url: https://github.com/PerkySue/PerkySue
    - label: Сообщество Discord
      url: https://discord.gg/UaJHEzFgXy
    - label: Поддержать на Patreon ❤
      url: https://patreon.com/PerkySue
    - label: Политика конфиденциальности
      url: ''
    - label: Документация по архитектуре
      url: ''
    credit: Создано Jérôme Corbiau  ·  Лицензия Apache 2.0
