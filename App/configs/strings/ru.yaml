header_tips:
  startup_message: Совет · Поставь курсор в Word, Gmail, Slack… и нажми Alt+T
  tips:
  - Совет · Нажми Alt+Q или кликни на аватар, чтобы остановить запись вручную
  - Совет · Alt+T бесплатен навсегда — быстрая транскрипция, LLM не нужен
  - Совет · Выдели текст, нажми Alt+I и скажи, что изменить
  - Совет · Нажми Alt+M где угодно, чтобы надиктовать email с нуля
  - 'Alt+A Pro: ведёт чат с контекстом — Alt+A Бесплатно: один вопрос за раз'
  - Совет · Шум мешает автостопу? Нажми Alt+Q
  - Совет · Выдели абзац → Alt+P — тон и грамматика за один шаг
  - 'Совет · Alt+C в терминале: опиши задачу обычными словами'
  - 'Совет · Alt+L: выдели текст и попроси перевести на любой язык'
  - 'Совет · Alt+D: надиктуй личное сообщение для WhatsApp, Slack, Discord, SMS'
  - 'Совет · Alt+X: создай пост или ответ для LinkedIn, X, YouTube, Reddit'
  - Совет · Вставь заметки митинга, выдели их, Alt+S — получи краткое резюме
  - Совет · Выдели черновик, нажми Alt+I, скажи «покороче» — готово
  - Совет · Alt+V до Alt+N = твои промпты. Редактируй в Промптах
  - Совет · Создай свой промпт для ответов на комменты в стиле бренда
  - Совет · Устал переписывать одни и те же AI-промпты? Сделай свой генератор
  - Идея промпта · Превращай заметки в LinkedIn-пост с цепляющим началом
  - Идея промпта · Генерируй форматированные видеопромпты для Kling/Runway
  - Идея промпта · Извлекай задачи и дедлайны из текста
  - 'Совет · Alt+H: задавай вопросы о PerkySue на вкладке Помощь'
  - Pro · Smart Focus не вставил? Скопируй результат со вкладки Консоль
  - 'Совет · Остановить запись: кликни на аватар или нажми Alt+Q'
  - Совет · Делай своё, пока PerkySue думает — результат появится там, где надо
  - Smart Focus · Нажал, пошёл дальше — текст сам появится в нужном месте
  - Совет · CPU? Whisper small (быстро) или medium (точно). ⚙️ → Модель STT
  - Совет · Шум вокруг, запись не останавливается? Alt+Q или кликни на аватар
  - Совет · Редактируй промпт каждого режима в Промптах — настрой PerkySue под себя
  - Совет · Whisper путает слово? Добавь его в ключевые слова STT в Промптах
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
