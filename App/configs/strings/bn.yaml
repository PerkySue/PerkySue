  - 'টিপ · কাস্টম প্রম্পট আইডিয়া: নোটকে LinkedIn পোস্টে বদলাও'
  - টিপ · Kling/Runway ভিডিও প্রম্পট ফরম্যাট করতে কাস্টম প্রম্পট ব্যবহার করো
  - 'টিপ · কাস্টম প্রম্পট আইডিয়া: টেক্সট থেকে অ্যাকশন আইটেম বের করো'
  - 'টিপ · Alt+H: সাহায্য ট্যাবে PerkySue সম্পর্কে যেকোনো প্রশ্ন করো'
