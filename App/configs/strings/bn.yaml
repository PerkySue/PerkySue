  - 'Smart Focus: ট্রিগার করো, সরে যাও, টেক্সট সেখানেই আসে'
  - টিপ · CPU? Whisper small (দ্রুত) বা medium (নির্ভুল)। ⚙️ → STT মডেল
  - টিপ · আশেপাশে আওয়াজ? রেকর্ডিং থামছে না? — Alt+Q বা আভাটারে ক্লিক
