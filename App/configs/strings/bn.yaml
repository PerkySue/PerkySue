    footer: লোকালেই চলে — তোমার টেক্সট তোমার মেশিনেই থাকে।
  hero:
    title: PerkySue
    tagline: AI-পাওয়ার্ড ভয়েস-টু-টেক্সট। ১০০% লোকাল। ১০০% প্রাইভেট।
    subtitle: শর্টকাট চাপো, বলো, আর টেক্সট সরাসরি কার্সারে আসে — যেকোনো অ্যাপে, যেকোনো উইন্ডোতে। কোনো ক্লাউড নেই। কোনো অ্যাকাউন্ট নেই। তোমার ডেটা মেশিন থেকে বের হয় না।
  why_exists:
    section_title: কেন PerkySue?
    line_1: বাকি সব ডিকটেশন টুল সমস্যার অর্ধেকটাই সমাধান করে।
    line_2: তারা তোমার কণ্ঠ লেখায় বদলায় — কিন্তু তোমার হয়ে ভাবে না।
    line_3: তোমাকে এখনও টেক্সট কপি করে chatbot-এ পেস্ট করতে হয়, অপেক্ষা করতে হয়, আবার কপি করতে হয়। এটা কয়েকটা স্টেপ — অথচ একটাতেই হওয়া উচিত। আর সেই সময় তোমার কথা একটা সার্ভারে চলে যাচ্ছে।
    line_4: PerkySue পুরো পাইপলাইন একটাই শর্টকাটে।
    line_5: ভয়েস রিকগনিশন, লোকাল LLM ট্রান্সফরমেশন, টেক্সট ইনজেকশন — এক শটে, যেকোনো অ্যাপে, কিছুই বাইরে যায় না।
    line_6: ভয়েস কোনো সাধারণ ডেটা না — এটা বায়োমেট্রিক।
    line_7: এতে তোমার উচ্চারণ, ছন্দ, আবেগ থাকে। ক্লাউড ডিকটেশন টুলগুলো এটা ক্যাপচার করে, পাঠায়, রেখে দেয় — এমন শর্তে যা বেশিরভাগ মানুষ পড়ে না।
    line_8: PerkySue অডিও RAM-এ ধরে, লোকালি প্রসেস করে, সাথে সাথে মুছে দেয়। কিছুই স্টোর, লগ বা ট্রান্সমিট হয় না।
    line_9: তোমার কণ্ঠ তোমারই থাকে!
  how_it_works:
    section_title: কীভাবে কাজ করে
    step1_title: শর্টকাট চাপো
    step1_description: 'কার্সার রাখো যেকোনো অ্যাপে (Word, Gmail, Slack, VS Code…) আর চাপো:'
    step2_title: স্বাভাবিকভাবে বলো
    step2_description: PerkySue রেকর্ড করে যতক্ষণ তুমি কথা বলো। আশেপাশে আওয়াজ থাকলে অটো-স্টপ নাও হতে পারে — Alt+Q চাপো বা প্রোফাইল পিকচারে ক্লিক করো।
    step3_title: টেক্সট সেখানেই আসে যেখানে শুরু করেছিলে
    step3_description: PerkySue শর্টকাট চাপার মুহূর্তে কার্সার আর অ্যাক্টিভ উইন্ডো লক করে নেয়।
    step4_title: প্রসেসিং চলার সময় কাজ চালিয়ে যাও
    step4_description: ট্যাব বদলাও, অন্যখানে টাইপ করো। Smart Focus রেজাল্ট সেখানেই পাঠায় যেখানে ট্রিগার করেছিলে।
  features:
    section_title: কীসে কাজে লাগে
    transcribe:
      card_title: 🎙️ ট্রান্সক্রাইব — ফ্রি, সবসময়
      badge: Alt+T
      description: বলো, আর রাও ট্রান্সক্রিপ্ট কার্সারে আসে। যেকোনো মেশিনে কাজ করে — Whisper মডেল বেছে নাও tiny (পুরনো হার্ডওয়্যার, ৪ GB RAM) থেকে large-v3 (আধুনিক GPU-তে স্টুডিও কোয়ালিটি) পর্যন্ত। কোনো LLM লাগে না, সাবস্ক্রিপশন নেই, শব্দসীমা নেই।
    improve:
      card_title: ✏️ উন্নত করো — সিলেক্ট করা টেক্সট রিরাইট করো
      badge: Alt+I
      description: একটা প্যারাগ্রাফ ঠিকমতো হচ্ছে না? সিলেক্ট করো, Alt+I চাপো আর বলো "এটা আরও জোরালো করো, অর্ধেক ছোট করো"। PerkySue একসাথে সিলেকশন আর তোমার ইন্সট্রাকশন দুটোই পড়ে। রিরাইটেড প্যারাগ্রাফ সরাসরি রিপ্লেস হয়, অ্যাপ না বদলেই।
      prompt: 🎤  "এটা আরও এনগেজিং করো, এখন যেটা আছে সেটা একটু শুকনো"
      result: ✅  তোমার সিলেকশন উন্নত ভার্সনে রিপ্লেস হয়ে যাবে।
    professional:
      card_title: 💼 প্রফেশনাল — টোন আর ভুল এক ধাপেই ঠিক করো
      badge: Alt+P
      description: দুটো প্যারাগ্রাফ আছে যেটায় ক্যাজুয়াল ভাষা আর কিছু ভুল মিশে গেছে? সিলেক্ট করো, Alt+P চাপো আর বলো "এটা বোর্ড মিটিংয়ের জন্য গুছিয়ে দাও"। LLM ফর্মালভাবে রিরাইট করে আর ভুল ঠিক করে — সিলেকশন রিপ্লেস হয়, কোনো ক্লিপবোর্ড ঝামেলা নেই।
      prompt: 🎤  "পরিষ্কার আর পালিশড করো, গ্রামারও ঠিক করো"
      result: ✅  তোমার সিলেকশন ফর্মাল, সংশোধিত ভার্সনে রিপ্লেস হবে।
  use_cases:
    section_title: আরও ভয়েস মোড দেখো
    intro: প্রতিটা মোড একটা ভয়েস কমান্ড — কোনো টেক্সট সিলেকশন লাগে না। শর্টকাট চাপো, বলো, রেজাল্ট কার্সারে আসে।
    footer: সব মোড পুরোপুরি তোমার মেশিনেই চলে। কোনো API কল নেই, ইন্টারনেট নেই, ডেটা বাইরে যায় না।
    items:
    - badge: Alt+M
      name: ইমেইল — বলো, পাঠাও
      prompt: 🎤  "John-কে একটা ইমেইল লেখো যে PerkySue লঞ্চের জন্য রেডি — আগামী সপ্তাহে সফট রিলিজের কথা বলো"
      result: ✅  একটা গোছানো প্রফেশনাল ইমেইল কার্সারে আসে। PerkySue তুমি যে ভাষায় বলো সেই ভাষায় লেখে।
    - badge: Alt+D
      name: ডাইরেক্ট মেসেজ — বন্ধুত্বপূর্ণ, পেস্টের জন্য রেডি
      prompt: 🎤  "দাদুকে বলো সয়া সস আনতে ভুলো না"
      result: ✅  দাদু! একটু মনে করিয়ে দিচ্ছি — সয়া সস কিন্তু আনতে ভুলো না! ভালো থেকো!
    - badge: Alt+X
      name: সোশ্যাল পোস্ট — পোস্ট বা রিপ্লাই
      prompt: 🎤  "এই YouTube কমেন্টের জবাব দাও — ধন্যবাদ বলো আর জানাও পরের ভিডিও আসছে সপ্তাহে plugin system নিয়ে"
      result: ✅  অনেক ধন্যবাদ! এটা ভালো লাগলো শুনে খুশি হলাম। পরের ভিডিও আসছে সপ্তাহে — plugin system নিয়ে। চোখ রেখো!
    - badge: Alt+C
      name: কনসোল — বলো, কমান্ড পাও
      prompt: 🎤  "গত ৭ দিনে পরিবর্তিত সব Python ফাইল খুঁজে বের করো"
      result: ✅  find . -name "*.py" -mtime -7 — টার্মিনালে পেস্টের জন্য রেডি।
    - badge: Alt+A
      name: Ask — কথোপকথনের মেমরি সহ Q&A
      prompt: 🎤  "mutex আর semaphore-এর পার্থক্য কী?"
      result: ✅  উত্তর কার্সারে আসে। ফলো-আপ প্রশ্ন করো — মডেল কথোপকথনের ইতিহাস মনে রাখে।
    - badge: Alt+V/B/N
      name: কাস্টম Prompts — তোমার নিয়ম, তোমার ওয়ার্কফ্লো
      prompt: 🎤  Prompt Modes-এ এডিট করা যায় এমন তিনটা কাস্টম স্লট।
      result: ✅  কথাকে মিটিং নোট, নির্দিষ্ট রাইটিং স্টাইল বা স্ট্রাকচার্ড আউটপুটে বদলাও।
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — ট্রিগার করো, ভুলে যাও
    description: PerkySue শর্টকাট চাপার মুহূর্তেই কার্সার পজিশন লক করে নেয়। Whisper ট্রান্সক্রাইব করার আর LLM জেনারেট করার সময় তুমি ফ্রি — অ্যাপ বদলাও, অন্যখানে টাইপ করো। রেজাল্ট সেখানেই আসে যেখানে ট্রিগার করেছিলে।
  voice_modes:
    section_title: ভয়েস মোড
    modes:
    - hotkey: Alt+T
      name: ট্রান্সক্রাইব
      description: দ্রুত ট্রান্সক্রিপশন (LLM ছাড়া)
      needs_llm: false
    - hotkey: Alt+I
      name: উন্নত করো
      description: টেক্সট পরিষ্কার আর ফরম্যাট করো
      needs_llm: true
    - hotkey: Alt+P
      name: প্রফেশনাল
      description: ফর্মাল বিজনেস রিরাইট
      needs_llm: true
    - hotkey: Alt+L
      name: অনুবাদ
      description: টার্গেট ভাষায় অনুবাদ করো
      needs_llm: true
    - hotkey: Alt+C
      name: কনসোল
      description: শেল কমান্ড বের করো
      needs_llm: true
    - hotkey: Alt+M
      name: ইমেইল
      description: প্রফেশনাল ইমেইল ফরম্যাটে লেখো
      needs_llm: true
    - hotkey: Alt+D
      name: ডাইরেক্ট মেসেজ
      description: WhatsApp/Slack/Discord/SMS — সম্পর্ক অনুযায়ী টোন
      needs_llm: true
    - hotkey: Alt+X
      name: সোশ্যাল পোস্ট
      description: LinkedIn/X/YouTube/Reddit — পোস্ট বা রিপ্লাই
      needs_llm: true
    - hotkey: Alt+S
      name: সারাংশ
      description: মূল পয়েন্টে সংক্ষেপ করো
      needs_llm: true
    - hotkey: Alt+A
      name: Ask
      description: প্রশ্ন করো — LLM কার্সারে জবাব দেয়
      needs_llm: true
    - hotkey: Alt+H
      name: সাহায্য
      description: PerkySue সম্পর্কে জানো — অ্যাপ KB + তোমার সেটিংস
      needs_llm: true
    - hotkey: Alt+G
      name: GenZ
      description: ক্যাজুয়াল, আধুনিক রিরাইট
      needs_llm: true
  competition:
    section_title: PerkySue বনাম প্রতিযোগী
    items:
    - title: vs. বিল্ট-ইন ডিকটেশন
      examples: Windows, macOS, Google
      description: ওরা শুধু শব্দ ট্রান্সক্রাইব করে। PerkySue ট্রান্সক্রাইব করে আর ভাবেও — ১১টা মোড তোমার কথাকে ইমেইল, কমান্ড, অনুবাদ, সারাংশে বদলায়।
    - title: vs. ক্লাউড ডিকটেশন
      examples: Wispr Flow, Typeless
      description: তোমার অডিও মেশিন থেকে বের হয় না। কোনো অ্যাকাউন্ট নেই, ইন্টারনেট নেই, শব্দসীমা নেই। প্লেনেও চলে, USB-তেও।
    - title: vs. ওপেন সোর্স টুল
      examples: Amical, OpenWhispr
      description: ওরা STT + পেস্ট করে। PerkySue-তে আছে লোকাল LLM পাইপলাইন, টেক্সট সিলেকশন + ভয়েস ইন্সট্রাকশন, Smart Focus আর GUI widget।
  privacy:
    section_title: প্রাইভেসি
    items:
    - icon: 🔒
      title: ইন্টারনেট লাগে না
      description: সব তোমার মেশিনেই চলে
    - icon: 🔇
      title: অডিও কখনো স্টোর হয় না
      description: RAM-এ ধরা, ট্রান্সক্রাইব, সাথে সাথে মুছে যায়
    - icon: 👤
      title: অ্যাকাউন্ট লাগে না
      description: সাইনআপ নেই, ট্র্যাকিং নেই, কুকি নেই
    - icon: 📂
      title: ওপেন সোর্স
      description: প্রতিটা লাইন কোড নিজে দেখতে পারো
  why_i_built_it:
    section_title: কেন বানিয়েছি PerkySue?
    paragraph_1: 'PerkySue শুরু হয়েছিল একটা পার্সোনাল প্রোডাক্টিভিটি টুল হিসেবে — কোনো পিচ ডেক নয়, প্রতিদিনের ঘর্ষণ থেকে জন্ম। বছরের পর বছর সফটওয়্যার আর্কিটেকচার আর কনভার্সেশনাল প্ল্যাটফর্ম ডিজাইন করার পর একটাই পাইপলাইন চাইছিলাম: voice → local STT → local LLM → টেক্সট যেখানে কাজ করি সেখানেই।'
    paragraph_2: কোডটা AI-এর সাথে মিলে বানানো। মজার বিষয় হলো, PerkySue আজ নিজেই আমাকে নিজের কোড লিখতে সাহায্য করছে — ভয়েস বা ডেটা ক্লাউডে না পাঠিয়েই।
