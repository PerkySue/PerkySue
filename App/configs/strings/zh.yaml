  hero:
    title: PerkySue
    tagline: AI 加持的语音输入。100% 本地。100% 私密。
    subtitle: 按下快捷键，开口说话，文字就出现在光标处 — 任意应用、任意窗口、任意输入框。无云端。无账号。数据永远不离开你的电脑。
  why_exists:
    section_title: PerkySue 为什么存在
    line_1: 其他所有听写工具都只解决了一半问题。
    line_2: 它们把你的声音转成文字 — 但不帮你思考。
    line_3: 你还是得把文字复制到聊天机器人里，等着，再把答案复制回来。本该一步搞定的事，变成了好几步 — 而且你的话已经跑到你管不着的服务器上了。
    line_4: PerkySue 把整条流程压进一个快捷键。
    line_5: 语音识别、本地 LLM 转换、文字注入 — 一气呵成，任意应用，什么都不用发出去。
    line_6: 声音不是普通数据 — 它是生物特征数据。
    line_7: 它携带着你的口音、你的节奏、你的情绪状态。云端听写工具会捕获、传输并保留它，依据的条款大多数人根本不会去读。它被用来训练模型，还会被分享给基础设施合作伙伴。
    line_8: PerkySue 把音频捕获在 RAM 里，本地处理，立刻丢弃。没有存储，没有日志，没有传输。
    line_9: 你的声音，永远是你的！
  how_it_works:
    section_title: 怎么用
    step1_title: 按下快捷键
    step1_description: 把光标放到你平时打字的应用里（Word、Gmail、Slack、VS Code……），然后按：
    step2_title: 自然地说话
    step2_description: PerkySue 会一直录音直到你停下来。环境噪音可能妨碍自动停止 — 按 Alt+Q（全局默认）或 Esc（应用在前台时），或点击头像。
    step3_title: 文字出现在你触发的地方
    step3_description: 你按下快捷键的那一刻，PerkySue 就锁定了光标和当前窗口。
    step4_title: 处理时继续干别的
    step4_description: 切标签、在别处打字都行。Smart Focus 会把结果注入到你开始的地方。
  features:
    section_title: 用户都用它来做什么
    transcribe:
      card_title: 🎙️ 转写 — 永久免费
      badge: Alt+T
      description: 开口说话，原始转写文字就出现在光标处。支持所有设备 — Whisper 模型从 tiny（老硬件，4 GB RAM）到 large-v3（现代 GPU 上的录音室级精度）随你选。无需 LLM，无需订阅，无字数限制。
    improve:
      card_title: ✏️ 改写 — 重写你选中的内容
      badge: Alt+I
      description: 你在写文档，某段感觉很平 — 意思到了但文字不到位。选中它，按 Alt+I，说「让它更有力，砍掉一半」。PerkySue 同时读取你的选区和你的指令。改写后的段落直接替换原文，不用离开应用。
      prompt: 🎤  "让这段更抓人，现在的版本太平了"
      result: ✅  你的选区被改写后的版本替换。
    professional:
      card_title: 💼 专业 — 一步修正语气和错误
      badge: Alt+P
      description: 你写了两段，口语和错别字混在一起。选中它们，按 Alt+P，说「整理一下，要交给董事会」。LLM 重写为正式风格并纠正错误 — 选区直接被替换，不用折腾剪贴板。
      prompt: 🎤  "要听起来正式，顺便修一下语法"
      result: ✅  你的选区被正式、纠错后的版本替换。
  use_cases:
    section_title: 更多语音模式实战
    intro: 每个模式都是语音指令 — 不需要选中文字。按下快捷键，开口说，结果就出现在光标处。
    footer: 所有模式完全在你的电脑上运行。无 API 调用，无网络，数据不离开你的设备。
    items:
    - badge: Alt+M
      name: 邮件 — 说出来，发出去
      prompt: 🎤  "给 John 写封邮件，告诉他 PerkySue 已经准备好上线了 — 提一下我们计划下周软发布"
      result: ✅  一封格式规范的专业邮件出现在光标处。PerkySue 用你说话的语言来写。
    - badge: Alt+D
      name: 私信 — 友好，随时可发
      prompt: 🎤  "跟奶奶说别忘了买酱油"
      result: ✅  奶奶！提醒一下 — 别忘了买酱油哦！祝你今天愉快！
    - badge: Alt+X
      name: 社交帖子 — 发帖或回复
      prompt: 🎤  "回复这条 YouTube 评论 — 说谢谢，下个视频下周出，讲插件系统"
      result: ✅  非常感谢！很高兴你喜欢。下个视频下周见 — 我们来聊聊插件系统。敬请期待！
    - badge: Alt+C
      name: 终端 — 描述需求，得到命令
      prompt: 🎤  "找出过去 7 天内修改过的所有 Python 文件"
      result: ✅  find . -name "*.py" -mtime -7 — 直接粘贴到终端就行。
    - badge: Alt+A
      name: Ask — 带对话记忆的 Q&A
      prompt: 🎤  "mutex 和 semaphore 有什么区别？"
      result: ✅  答案注入到光标处。继续追问 — 模型会记住对话历史。
    - badge: Alt+V/B/N
      name: 自定义 Prompts — 你的规则，你的工作流
      prompt: 🎤  在 Prompt Modes 里可编辑的三个自定义 prompts 槽。
      result: ✅  把语音变成会议记录、特定写作风格、结构化输出 — 随你定。
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — 触发后随便干
    description: 你按下快捷键的那一刻，PerkySue 就记住了光标位置。Whisper 转写、LLM 生成的时候，你可以随便切应用、在别处打字、打开其他窗口。结果会落在你触发的地方 — 不是你现在的光标处。
  voice_modes:
    section_title: 语音模式
    modes:
    - hotkey: Alt+T
      name: 转写
      description: 快速转写（无需 LLM）
      needs_llm: false
    - hotkey: Alt+I
      name: 改写
      description: 清理并重新格式化文字
      needs_llm: true
    - hotkey: Alt+P
      name: 专业
      description: 正式商务风格改写
      needs_llm: true
    - hotkey: Alt+L
      name: 翻译
      description: 翻译成目标语言
      needs_llm: true
    - hotkey: Alt+C
      name: 终端
      description: 提取 shell 命令
      needs_llm: true
    - hotkey: Alt+M
      name: 邮件
      description: 格式化为专业邮件
      needs_llm: true
    - hotkey: Alt+D
      name: 私信
      description: WhatsApp/Slack/Discord/SMS — 语气自动适配关系
      needs_llm: true
    - hotkey: Alt+X
      name: 社交帖子
      description: LinkedIn/X/YouTube/Reddit — 发帖或回复
      needs_llm: true
    - hotkey: Alt+S
      name: 总结
      description: 提炼关键要点
      needs_llm: true
    - hotkey: Alt+A
      name: Ask
      description: 提问 — LLM 在光标处回答
      needs_llm: true
    - hotkey: Alt+H
      name: 帮助
      description: 问关于 PerkySue 的问题 — 应用知识库 + 你的设置
      needs_llm: true
    - hotkey: Alt+G
      name: GenZ
      description: 轻松随意的现代风改写
      needs_llm: true
  competition:
    section_title: PerkySue vs. 竞品
    items:
    - title: vs. 系统内置听写
      examples: Windows、macOS、Google
      description: 它们只转写文字。PerkySue 转写还能思考 — 11 种模式把你的语音变成邮件、命令、翻译、摘要。
    - title: vs. 云端听写
      examples: Wispr Flow、Typeless
      description: 你的音频永远不离开电脑。无账号，无网络，无字数限制。飞行模式或 U 盘上也能用。
    - title: vs. 开源工具
      examples: Amical、OpenWhispr
      description: 它们只做 STT + 粘贴。PerkySue 还加了本地 LLM 流水线、选区 + 语音指令、Smart Focus 和 GUI 组件。
  privacy:
    section_title: 隐私
    items:
    - icon: 🔒
      title: 无需网络
      description: 全部在你的电脑上运行
    - icon: 🔇
      title: 音频从不存储
      description: 捕获到 RAM，转写，立刻丢弃
    - icon: 👤
      title: 无需账号
      description: 无注册，无追踪，无 Cookie
    - icon: 📂
      title: 开源
      description: 自己检查每一行代码
  why_i_built_it:
    section_title: 为什么要做 PerkySue
    paragraph_1: PerkySue 起初是个人生产力工具 — 我每天自己需要的东西，不是为了融资 PPT。在设计了多年软件架构和对话平台之后，我想把整条流程压进一个工具：语音 → 本地 STT → 本地 LLM → 文字注入到我已经在工作的地方。
    paragraph_2: 代码是和 AI 共同开发的：这个项目持续地与 AI 编程助手合作完成。本地流水线相当复杂。有趣的是，PerkySue 今天正在帮我写它自己的代码，没有把我的声音或数据发到云端。
  links:
    section_title: 链接
    items:
    - label: GitHub 仓库
      url: https://github.com/PerkySue/PerkySue
    - label: Discord 社区
