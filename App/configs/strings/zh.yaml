header_tips:
  startup_message: 小贴士 · 把光标放到 Word、Gmail、Slack……然后按 Alt+T
  tips:
  - 小贴士 · 按 Alt+Q 或点击头像停止听取
  - 小贴士 · Alt+T 永久免费 — 快速转写，无字数限制
  - 小贴士 · 选中文字，按 Alt+I，说你想改什么
  - 小贴士 · 在任意地方按 Alt+M，口述一整封邮件
  - Alt+A Pro：聊天延续上下文 — Alt+A 免费：每次一问
  - 小贴士 · 有环境噪音不会自动停？按 Alt+Q 停止
  - 小贴士 · 选中段落 → Alt+P — 一键修语气和语法
  - 小贴士 · 在终端按 Alt+C：用大白话描述你要什么
  - 小贴士 · Alt+L：选中文字，让它翻译成任意语言
  - 小贴士 · Alt+D：口述发给 WhatsApp、Slack、Discord、SMS 的消息
  - 小贴士 · Alt+X：为 LinkedIn、X、YouTube、Reddit 生成帖子或回复
  - 小贴士 · 粘入会议记录，选中，Alt+S 生成简洁摘要
  - 小贴士 · 选中草稿，Alt+I，说「缩短它」— 搞定
  - 小贴士 · Alt+V 到 Alt+N = 你的自定义 prompts。在 Prompts 里编辑
  - 小贴士 · 建一个自定义 prompt，用品牌语气回复评论
  - 小贴士 · 厌倦了重复写同样的 AI prompt？做成自定义 prompt
  - 小贴士 · 自定义 prompt 灵感：把笔记变成带钩子的 LinkedIn 帖
  - 小贴士 · 用自定义 prompts 生成格式化的 Kling/Runway 视频 prompt
  - 小贴士 · 自定义 prompt 灵感：从文字中提取行动项和截止日期
  - 小贴士 · Alt+H：在帮助选项卡问我任何关于 PerkySue 的问题
  - Pro · 如果 Smart Focus 没有粘贴，从终端选项卡复制输出
  - 小贴士 · 退出听取状态：点击头像或按 Alt+Q
  - 小贴士 · PerkySue 处理时随便干别的 — 不用等
  - Smart Focus：触发后去忙别的，文字会落在正确的地方
  - 小贴士 · 用 CPU？Whisper small（快）或 medium（准）。⚙️ → STT 模型
  - 小贴士 · 有环境噪音？听取不停？— Alt+Q 或点击头像
  - 小贴士 · 在 Prompts 里编辑每个模式的 prompt — 把 PerkySue 调成你的风格
  - 小贴士 · Whisper 识错某个词？在 Prompts 的 STT 关键词里加上它
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
