    custom_prompts: 'Prompt personalizzati: Alt+V/B/N = 3 slot — workflow riutilizzabili con le tue regole e il tuo tono.'
    footer: Funziona in locale — il tuo testo resta sulla tua macchina.
  hero:
    title: PerkySue
    tagline: Dettatura vocale con IA. 100% locale. 100% privato.
    subtitle: Premi una scorciatoia, parla, e il testo appare dove hai il cursore — in qualsiasi app, finestra o campo di testo. Niente cloud. Niente account. I tuoi dati non lasciano mai il tuo PC.
  why_exists:
    section_title: Perché esiste PerkySue
    line_1: Tutti gli altri strumenti di dettatura risolvono solo metà del problema.
    line_2: Convertono la tua voce in parole — ma non pensano insieme a te.
    line_3: Copi ancora il testo in un chatbot, aspetti, poi riporti la risposta. Sono più passaggi per qualcosa che dovrebbe essere uno solo — e le tue parole sono appena finite su un server che non controlli.
    line_4: PerkySue è tutta la pipeline in una sola scorciatoia.
    line_5: Riconoscimento vocale, trasformazione con LLM locale, iniezione del testo — in un colpo solo, in qualsiasi app, senza inviare nulla all'esterno.
    line_6: La voce non è un dato neutro — è un dato biometrico.
    line_7: Porta il tuo accento, il tuo ritmo, il tuo stato emotivo. Gli strumenti di dettatura cloud la captano, la trasmettono e la conservano in base a condizioni che quasi nessuno legge. Viene usata per addestrare modelli e condivisa con partner infrastrutturali.
    line_8: PerkySue cattura l'audio in RAM, lo elabora localmente e lo elimina subito. Niente viene salvato, registrato o trasmesso.
    line_9: La tua voce resta la tua.
  how_it_works:
    section_title: Come funziona
    step1_title: Premi una scorciatoia
    step1_description: 'Posiziona il cursore in qualsiasi app dove scrivi di solito (Word, Gmail, Slack, VS Code…) e premi:'
    step2_title: Parla liberamente
    step2_description: PerkySue registra finché non smetti di parlare. Il rumore ambientale può impedire l'arresto automatico — premi Alt+Q (default globale) o Esc quando l'app è in primo piano, oppure clicca sulla foto profilo.
    step3_title: Il testo appare dove hai premuto
    step3_description: PerkySue blocca il cursore e la finestra attiva nel momento in cui premi la scorciatoia.
    step4_title: Continua a lavorare mentre elabora
    step4_description: Cambia scheda, scrivi altrove. Smart Focus inietta il risultato dove hai iniziato.
  features:
    section_title: Come lo usano gli utenti
    transcribe:
      card_title: 🎙️ Trascrivi — gratis, per sempre
      badge: Alt+T
      description: Parla, e la trascrizione grezza appare al tuo cursore. Funziona su qualsiasi macchina — scegli i modelli Whisper da tiny (hardware datato, 4 GB RAM) a large-v3 (qualità studio su GPU recenti). Nessun LLM richiesto, nessun abbonamento, nessun limite di parole.
    improve:
      card_title: ✏️ Migliora — riscrivi quello che selezioni
      badge: Alt+I
      description: Stai scrivendo un documento e un paragrafo non convince — l'idea c'è ma il testo non funziona. Selezionalo, premi Alt+I e di' «rendilo più incisivo e dimezzalo». PerkySue legge la tua selezione e la tua istruzione insieme. Il paragrafo riscritto sostituisce l'originale, senza lasciare l'app.
      prompt: 🎤  "rendilo più coinvolgente, la versione attuale è troppo piatta"
      result: ✅  La tua selezione viene sostituita dalla versione migliorata.
    professional:
      card_title: 💼 Professionale — correggi tono ed errori in un colpo
      badge: Alt+P
      description: Hai scritto due paragrafi che mescolano un tono casual con qualche errore. Selezionali, premi Alt+P e di' «sistemali, è per una presentazione al consiglio». Il LLM riscrive in modo formale e corregge gli errori — la tua selezione viene sostituita, senza acrobazie con il copia-incolla.
      prompt: 🎤  "deve suonare curato, correggi anche la grammatica"
      result: ✅  La tua selezione viene sostituita da una versione formale e corretta.
  use_cases:
    section_title: Altri modi vocali in azione
    intro: Ogni modo funziona come un comando vocale — nessuna selezione di testo necessaria. Premi la scorciatoia, parla, e il risultato appare al tuo cursore.
    footer: Tutti i modi girano interamente sul tuo PC. Nessuna chiamata API, niente internet, nessun dato che lascia la tua macchina.
    items:
    - badge: Alt+M
      name: Email — dilla, inviala
      prompt: 🎤  "scrivi una mail a John per dirgli che PerkySue è pronta al lancio — menziona che puntiamo a un rilascio soft la prossima settimana"
      result: ✅  Un'email professionale e ben formattata appare al tuo cursore. PerkySue scrive nella lingua che parli.
    - badge: Alt+D
      name: Messaggio diretto — amichevole, pronto da inviare
      prompt: 🎤  "di' alla nonna di non dimenticare la salsa di soia"
      result: ✅  Nonna! Promemoria veloce — non dimenticare la salsa di soia! Buona giornata!
    - badge: Alt+X
      name: Post social — per pubblicare o rispondere
      prompt: 🎤  "rispondi a questo commento YouTube — di' grazie e che il prossimo video esce la settimana prossima sul sistema di plugin"
      result: ✅  Grazie mille! Sono davvero contento che ti sia piaciuto. Prossimo video la settimana prossima — entriamo nel sistema di plugin. A presto!
    - badge: Alt+C
      name: Console — descrivi il comando, ottieni il comando
      prompt: 🎤  "trova tutti i file Python modificati negli ultimi 7 giorni"
      result: ✅  find . -name "*.py" -mtime -7 — pronto da incollare nel terminale.
    - badge: Alt+A
      name: Ask — Q&A con memoria della conversazione
      prompt: 🎤  "qual è la differenza tra un mutex e un semaforo?"
      result: ✅  La risposta viene iniettata al tuo cursore. Fai una domanda di seguito — il modello conserva la cronologia della conversazione.
    - badge: Alt+V/B/N
      name: Prompts personalizzati — le tue regole, i tuoi workflow
      prompt: 🎤  Tre slot di prompt personalizzabili in Prompts.
      result: ✅  Trasforma la tua voce in appunti di riunione, stile di scrittura, output strutturato — tutto quello che ti serve.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — lancia e dimentica
    description: PerkySue ricorda la posizione del cursore nel momento in cui premi la scorciatoia. Mentre Whisper trascrive e il LLM genera, sei libero di cambiare app, continuare a scrivere altrove, aprire un'altra finestra. Il risultato arriva dove hai premuto — non dove sei adesso.
