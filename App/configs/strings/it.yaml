header_tips:
  startup_message: Tip · Posiziona il cursore in Word, Gmail, Slack… poi premi Alt+T
  tips:
  - Tip · Premi Alt+Q o clicca sull'avatar per fermare l'ascolto
  - Tip · Alt+T è gratis per sempre — trascrizione rapida, nessun limite
  - Tip · Seleziona del testo, Alt+I, e di' cosa vuoi cambiare
  - Tip · Premi Alt+M ovunque per dettare un'email da zero
  - 'Alt+A Pro: tiene il filo in chat — Alt+A Gratis: una domanda alla volta'
  - Tip · Rumore ambientale = nessun arresto auto? Premi Alt+Q per fermare
  - Tip · Seleziona un paragrafo → Alt+P — tono e grammatica in un colpo
  - 'Tip · Alt+C nel terminale: descrivi quello che ti serve in parole semplici'
  - 'Tip · Alt+L: seleziona del testo e chiedi di tradurlo in qualsiasi lingua'
  - 'Tip · Alt+D: detta un messaggio diretto per WhatsApp, Slack, Discord, SMS'
  - 'Tip · Alt+X: crea un post o una risposta per LinkedIn, X, YouTube, Reddit'
  - Tip · Incolla note di riunione, selezionale, Alt+S per un riassunto rapido
  - Tip · Seleziona una bozza, Alt+I, di' «accorcialo» — fatto
  - Tip · Alt+V a Alt+N = i tuoi prompt personali. Modificali in Prompts
  - Tip · Crea un prompt perso per rispondere ai commenti nel tono del tuo brand
  - Tip · Stufo di riscrivere gli stessi prompt IA? Fanne un prompt perso
  - 'Tip · Idea prompt perso: trasforma note in un post LinkedIn con un hook'
  - Tip · Usa prompts perso per prompt video Kling/Runway già formattati
  - 'Tip · Idea prompt perso: estrai azioni e scadenze da un testo'
  - 'Tip · Alt+H: chiedimi tutto su PerkySue nella scheda Aiuto'
  - Pro · Se Smart Focus non ha incollato, copia l'output dalla scheda Console
  - 'Tip · Per uscire dalla fase Ascolto: clicca sull''avatar o premi Alt+Q'
  - Tip · Fai altro mentre PerkySue elabora — non devi aspettare
  - 'Smart Focus: lanci, vai avanti, il testo arriva nel posto giusto'
  - Tip · CPU? Whisper small (veloce) o medium (preciso). ⚙️ → Modello STT
  - Tip · Rumore ambientale? L'ascolto non si ferma? — Alt+Q o clic sull'avatar
  - Tip · Modifica il prompt di ogni modo in Prompts — adatta PerkySue a te
  - Tip · Whisper sbaglia una parola? Aggiungila alle parole chiave STT in Prompts
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
