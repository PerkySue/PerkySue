      needs_llm: true
  competition:
    section_title: PerkySue vs. Concorrenza
    items:
    - title: vs. dettatura integrata
      examples: Windows, macOS, Google
      description: Trascrivono solo parole. PerkySue trascrive e ragiona — 11 modi trasformano la tua voce in email, comandi, traduzioni, riassunti.
    - title: vs. dettatura cloud
      examples: Wispr Flow, Typeless
      description: Il tuo audio non lascia mai il tuo PC. Nessun account, nessun internet, nessun limite di parole. Funziona in aereo o da una chiavetta USB.
    - title: vs. strumenti open source
      examples: Amical, OpenWhispr
      description: Fanno STT + incolla. PerkySue aggiunge una pipeline LLM locale, selezione testo + istruzioni vocali, Smart Focus e un widget GUI.
  privacy:
    section_title: Privacy
    items:
    - icon: 🔒
      title: Nessun internet richiesto
      description: Tutto gira sul tuo PC
    - icon: 🔇
      title: Audio mai salvato
      description: Catturato in RAM, trascritto, eliminato subito
    - icon: 👤
      title: Nessun account necessario
      description: Nessuna registrazione, nessun tracking, nessun cookie
    - icon: 📂
      title: Open source
      description: Ispeziona ogni riga di codice tu stesso
  why_i_built_it:
    section_title: Perché ho creato PerkySue
    paragraph_1: 'PerkySue è nata come strumento di produttività personale — qualcosa di cui avevo bisogno ogni giorno, non un pitch deck. Dopo anni a progettare architetture software e piattaforme conversazionali, volevo una sola pipeline: voce → STT locale → LLM locale → testo iniettato dove lavoro già.'
    paragraph_2: 'Il codice è stato co-sviluppato con l''IA: questo progetto ha implicato una collaborazione continua con assistenti IA per la programmazione. La pipeline locale è complessa. La cosa divertente è che oggi PerkySue mi aiuta a scrivere il proprio codice, senza inviare la mia voce o i miei dati nel cloud.'
  links:
    section_title: Link
    items:
