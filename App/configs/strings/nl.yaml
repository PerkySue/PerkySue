header_tips:
  startup_message: Tip · Zet je cursor in Word, Gmail, Slack… en druk op Alt+T
  tips:
  - Tip · Druk op Alt+Q of klik op de avatar om handmatig te stoppen
  - Tip · Alt+T is voor altijd gratis — snelle transcriptie, geen LLM nodig
  - Tip · Selecteer tekst, druk op Alt+I en zeg wat je wilt veranderen
  - Tip · Druk overal op Alt+M om een volledige e-mail te dicteren
  - 'Alt+A Pro: houdt het draadje in de chat — Alt+A gratis: één vraag per keer'
  - Tip · Omgevingsgeluid voorkomt automatisch stoppen? Druk op Alt+Q
  - Tip · Selecteer een alinea → Alt+P — toon en grammatica in één keer
  - 'Tip · Alt+C in je terminal: beschrijf wat je nodig hebt in gewone taal'
  - 'Tip · Alt+L: selecteer tekst en vraag om vertaling naar een taal'
  - 'Tip · Alt+D: dicteer een direct bericht voor WhatsApp, Slack, Discord, SMS'
  - 'Tip · Alt+X: maak een post of reactie voor LinkedIn, X, YouTube, Reddit'
  - Tip · Plak vergadernotities, selecteer ze, Alt+S voor een korte samenvatting
  - Tip · Selecteer een kladversie, Alt+I, zeg 'maak het korter' — klaar
  - Tip · Alt+V t/m Alt+N = jouw eigen prompts. Bewerk ze in Prompts
  - Tip · Maak een eigen prompt om te reageren in de toon van jouw merk
  - Beu om steeds dezelfde AI-prompts te typen? Maak een eigen promptgenerator
  - 'Tip · Promptidee: zet notities om in een LinkedIn-post met een haak'
  - Tip · Gebruik eigen prompts voor opgemaakte Kling/Runway-videoprompts
  - 'Tip · Promptidee: extraheer acties en deadlines uit een tekst'
  - 'Tip · Alt+H: stel me alles over PerkySue in het Help-tabblad'
  - Smart Focus heeft niet geplakt? Kopieer de uitvoer uit het Console-tabblad
  - 'Tip · Luisterstap stoppen: klik op de avatar of druk op Alt+Q'
  - Tip · Wissel van app terwijl PerkySue verwerkt — resultaat landt waar je begon
  - 'Tip · Smart Focus: starten, doorgaan, tekst verschijnt op de juiste plek'
  - CPU? Gebruik Whisper small (snel) of medium (nauwkeurig). ⚙️ → STT-model
  - Tip · Omgevingsgeluid? Stopt niet vanzelf? — Alt+Q of klik op de avatar
  - Tip · Bewerk de prompt van elke modus in Prompts — pas PerkySue aan op jou
  - Tip · Whisper fout op een woord? Voeg het toe aan STT-trefwoorden in Prompts
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
