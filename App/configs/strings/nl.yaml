  hero:
    title: PerkySue
    tagline: Spraak naar tekst met AI. 100% lokaal. 100% privé.
    subtitle: Druk op een sneltoets, spreek, en de tekst verschijnt waar je cursor staat — in elke app, elk venster, elk tekstveld. Geen cloud. Geen account. Je data verlaat je machine nooit.
  why_exists:
    section_title: Waarom PerkySue bestaat
    line_1: Alle andere dicteerprogramma's lossen maar de helft van het probleem op.
    line_2: Ze zetten je stem om in woorden — maar ze denken niet met je mee.
    line_3: Je kopieert tekst naar een chatbot, wacht, en plakt het antwoord terug. Dat zijn meerdere stappen voor iets wat er maar één zou moeten zijn — en je woorden zijn net naar een server gereisd die jij niet beheert.
    line_4: PerkySue is de hele pipeline in één sneltoets.
    line_5: Spraakherkenning, lokale LLM-verwerking en tekstinjectie — in één keer, in elke app, zonder dat er iets je machine verlaat.
    line_6: Stem is geen neutrale data — het is biometrisch.
    line_7: Het draagt je accent, je ritme, je emotionele staat. Cloud-dicteerprogramma's leggen het vast, sturen het door en bewaren het onder voorwaarden die de meeste mensen nooit lezen. Het wordt gebruikt om modellen te trainen en gedeeld met infrastructuurpartners.
    line_8: PerkySue legt audio vast in RAM, verwerkt het lokaal en verwijdert het meteen. Niets wordt opgeslagen, gelogd of verstuurd.
    line_9: Jouw stem blijft van jou.
  how_it_works:
    section_title: Hoe het werkt
    step1_title: Druk op een sneltoets
    step1_description: 'Zet je cursor in elke app waar je normaal typt (Word, Gmail, Slack, VS Code…) en druk op:'
    step2_title: Spreek gewoon
    step2_description: PerkySue neemt op tot je stopt met praten. Omgevingsgeluid kan automatisch stoppen verhinderen — druk op Alt+Q (globale standaard) of Esc als de app op de voorgrond staat, of klik op de profielfoto.
    step3_title: Tekst verschijnt waar je begon
    step3_description: PerkySue vergrendelt je cursor en actieve venster op het moment dat je de sneltoets indrukt.
    step4_title: Werk door terwijl het verwerkt
    step4_description: Wissel van tab, typ ergens anders. Smart Focus injecteert het resultaat waar je begon.
  features:
    section_title: Wat mensen ermee doen
    transcribe:
      card_title: 🎙️ Transcriberen — gratis, voor altijd
      badge: Alt+T
      description: Spreek, en de ruwe transcriptie verschijnt bij je cursor. Werkt op elke machine — kies Whisper-modellen van tiny (oude hardware, 4 GB RAM) tot large-v3 (studiokwaliteit op moderne GPU's). Geen LLM nodig, geen abonnement, geen woordlimiet.
    improve:
      card_title: ✏️ Verbeteren — herschrijf wat je selecteert
      badge: Alt+I
      description: Je werkt aan een doc en één alinea klopt niet — het idee is er maar de tekst loopt niet lekker. Selecteer het, druk op Alt+I en zeg "maak dit scherper en halveer het". PerkySue leest je selectie en je instructie tegelijk. De herschreven alinea vervangt het origineel, ter plekke, zonder de app te verlaten.
      prompt: 🎤  "maak dit dynamischer, de huidige versie is te saai"
      result: ✅  Je selectie wordt vervangen door de verbeterde versie.
    professional:
      card_title: 💼 Professioneel — toon en fouten in één keer fixen
      badge: Alt+P
      description: Je hebt twee alinea's geschreven met een mix van informele toon en typfouten. Selecteer ze, druk op Alt+P en zeg "maak dit netjes, het moet in een boardpresentatie". De LLM herschrijft formeel en corrigeert fouten — je selectie wordt vervangen, zonder gedoe met het klembord.
      prompt: 🎤  "het moet er verzorgd uitzien, fix ook de grammatica"
      result: ✅  Je selectie wordt vervangen door een formele, gecorrigeerde versie.
  use_cases:
    section_title: Meer spraakmodi in actie
    intro: Elke modus werkt als een spraakopdracht — geen tekstselectie nodig. Druk op de sneltoets, spreek, en het resultaat verschijnt bij je cursor.
    footer: Alle modi draaien volledig op jouw machine. Geen API-call, geen internet, geen data die je apparaat verlaat.
    items:
    - badge: Alt+M
      name: E-mail — zeg het, stuur het
      prompt: 🎤  "schrijf een e-mail aan John om hem te laten weten dat PerkySue klaar is voor lancering — vermeld dat we volgende week een zachte release plannen"
      result: ✅  Een goed opgemaakte, professionele e-mail verschijnt bij je cursor. PerkySue schrijft in de taal die je spreekt.
    - badge: Alt+D
      name: Direct bericht — vriendelijk, klaar om te plakken
      prompt: 🎤  "zeg tegen opa dat hij de sojasaus niet moet vergeten"
      result: ✅  Opa! Kleine herinnering — vergeet de sojasaus niet! Fijne dag nog!
    - badge: Alt+X
      name: Sociale post — posten of reageren
      prompt: 🎤  "reageer op dit YouTube-commentaar — bedank ze en zeg dat de volgende video volgende week uitkomt over het pluginsysteem"
      result: ✅  Heel erg bedankt! Blij dat je het leuk vond. Volgende video komt volgende week — we duiken in het pluginsysteem. Tot dan!
    - badge: Alt+C
      name: Console — beschrijf het, krijg de opdracht
      prompt: 🎤  "vind alle Python-bestanden die in de afgelopen 7 dagen zijn gewijzigd"
      result: ✅  find . -name "*.py" -mtime -7 — klaar om in je terminal te plakken.
    - badge: Alt+A
      name: Ask — Q&A met gespreksgeheugen
      prompt: 🎤  "wat is het verschil tussen een mutex en een semafoor?"
      result: ✅  Het antwoord wordt bij je cursor ingevoegd. Stel een vervolgvraag — het model onthoudt het gesprek.
    - badge: Alt+V/B/N
      name: Eigen prompts — jouw regels, jouw workflows
      prompt: 🎤  Drie bewerkbare promptslots in Prompts.
      result: ✅  Zet spraak om in vergadernotities, een schrijfstijl, gestructureerde output — wat je maar nodig hebt.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — starten en vergeten
    description: PerkySue onthoudt de positie van je cursor op het moment dat je de sneltoets indrukt. Terwijl Whisper transcribeert en de LLM genereert, kun je van app wisselen, ergens anders typen, gewoon doorgaan. Het resultaat landt waar je begon — niet waar je cursor nu staat.
