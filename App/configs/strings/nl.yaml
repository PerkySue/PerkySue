      needs_llm: true
  competition:
    section_title: PerkySue vs. de concurrentie
    items:
    - title: vs. ingebouwde dictatie
      examples: Windows, macOS, Google
      description: Die transcriberen woorden. PerkySue transcribeert én denkt — 11 modi zetten je stem om in e-mails, opdrachten, vertalingen, samenvattingen.
    - title: vs. cloud-dictatie
      examples: Wispr Flow, Typeless
      description: Je audio verlaat je machine nooit. Geen account, geen internet, geen woordlimiet. Werkt in vliegtuigmodus en vanaf een USB-stick.
    - title: vs. open-source tools
      examples: Amical, OpenWhispr
      description: Die doen STT + plakken. PerkySue voegt een lokale LLM-pipeline toe, tekstselectie + spraakinstructies, Smart Focus en een GUI-widget.
  privacy:
    section_title: Privacy
    items:
    - icon: 🔒
      title: Geen internet nodig
      description: Alles draait op jouw machine
    - icon: 🔇
      title: Audio nooit opgeslagen
      description: Vastgelegd in RAM, getranscribeerd, meteen verwijderd
    - icon: 👤
      title: Geen account nodig
      description: Geen aanmelding, geen tracking, geen cookies
    - icon: 📂
      title: Open source
      description: Bekijk zelf elke regel code
  why_i_built_it:
    section_title: Waarom ik dit bouwde
    paragraph_1: 'PerkySue begon als een persoonlijk productiviteitshulpmiddel — iets wat ik zelf elke dag nodig had, geen pitch deck. Na jaren softwarearchitectuur en conversatieplatforms ontwerpen, wilde ik één pipeline: stem → lokale STT → lokale LLM → tekst ingevoegd waar ik al werk.'
    paragraph_2: 'De code is mede-ontwikkeld met AI: dit project omvatte intensieve samenwerking met AI-programmeerassistenten. De lokale pipeline is complex. Grappig genoeg helpt PerkySue me vandaag bij het coderen van haar eigen code, zonder mijn stem of data naar de cloud te sturen.'
