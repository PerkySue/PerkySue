  competition:
    section_title: PerkySue vs. Konkurrenz
    items:
    - title: vs. eingebaute Diktierfunktion
      examples: Windows, macOS, Google
      description: Die liefern nur Wörter. PerkySue transkribiert und denkt — 11 Modi wandeln Sprache in E-Mails, Befehle, Übersetzungen, Zusammenfassungen.
    - title: vs. Cloud-Diktat
      examples: Wispr Flow, Typeless
      description: Dein Audio verlässt nie deinen PC. Kein Konto, kein Internet, kein Wortlimit. Läuft im Flugzeugmodus oder von einem USB-Stick.
    - title: vs. Open-Source-Tools
      examples: Amical, OpenWhispr
      description: Die machen STT + Einfügen. PerkySue fügt eine lokale LLM-Pipeline, Textauswahl + Sprachanweisungen, Smart Focus und ein GUI-Widget hinzu.
  privacy:
    section_title: Datenschutz
    items:
    - icon: 🔒
      title: Kein Internet nötig
      description: Alles läuft auf deinem PC
    - icon: 🔇
      title: Audio wird nie gespeichert
      description: Im RAM erfasst, transkribiert, sofort gelöscht
    - icon: 👤
      title: Kein Konto nötig
      description: Keine Anmeldung, kein Tracking, keine Cookies
    - icon: 📂
      title: Open Source
      description: Jede Codezeile selbst prüfen
  why_i_built_it:
    section_title: Warum ich's gebaut habe
    paragraph_1: 'PerkySue begann als persönliches Produktivitätswerkzeug — etwas, das ich täglich selbst brauchte, kein Pitch-Deck-Projekt. Nach Jahren der Entwicklung von Software-Architekturen und Konversationsplattformen wollte ich eine einzige Pipeline: Stimme → lokales STT → lokales LLM → Text injiziert wo ich bereits arbeite.'
    paragraph_2: 'Der Code wurde gemeinsam mit KI entwickelt: dieses Projekt entstand in enger Zusammenarbeit mit KI-Programmierassistenten. Die lokale Pipeline ist komplex. Witzigerweise hilft mir PerkySue heute, ihren eigenen Code zu schreiben — ohne meine Stimme oder meine Daten in die Cloud zu schicken.'
