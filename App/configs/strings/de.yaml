header_tips:
  startup_message: Tipp · Cursor in Word, Gmail, Slack… setzen, dann Alt+T drücken
  tips:
  - Tipp · Alt+Q drücken oder Sidebar-Avatar klicken, um die Aufnahme zu stoppen
  - Tipp · Alt+T ist für immer gratis — schnelle Transkription, kein Wortlimit
  - Tipp · Text markieren, Alt+I drücken, sagen was geändert werden soll
  - Tipp · Alt+M überall drücken, um eine komplette E-Mail zu diktieren
  - 'Alt+A Pro: behält den Faden im Chat — Alt+A Gratis: eine Frage pro Mal'
  - Tipp · Umgebungslärm = kein Auto-Stop? Alt+Q drücken zum Stoppen
  - Tipp · Absatz markieren → Alt+P — Ton und Grammatik in einem Schritt
  - 'Tipp · Alt+C im Terminal: in normaler Sprache beschreiben, was du brauchst'
  - 'Tipp · Alt+L: Text markieren und in eine beliebige Sprache übersetzen lassen'
  - 'Tipp · Alt+D: Direktnachricht für WhatsApp, Slack, Discord, SMS diktieren'
  - 'Tipp · Alt+X: Post oder Antwort für LinkedIn, X, YouTube, Reddit erstellen'
  - Tipp · Notizen einfügen, markieren, Alt+S für kurz zusammenfassen
  - Tipp · Entwurfstext markieren, Alt+I, 'kürzer machen' sagen — fertig
  - Tipp · Alt+V bis Alt+N = deine eigenen Prompts. Unter Prompts bearbeiten
  - 'Tipp · Eigenen Prompt erstellen: Kommentare im Markenton'
  - Tipp · Immer dieselben Prompts? → eigenen Prompt draus machen
  - 'Tipp · Prompt-Idee: Notizen in einen LinkedIn-Post mit einem Hook verwandeln'
  - Tipp · Eigene Prompts für formatierte Kling/Runway-Video-Prompts nutzen
  - 'Tipp · Prompt-Idee: Aufgaben und Fristen aus einem Text extrahieren'
  - 'Tipp · Alt+H: Stell mir Fragen zu PerkySue im Hilfe-Tab'
  - Pro · Hat Smart Focus nicht eingefügt? Output im Konsole-Tab kopieren
  - 'Tipp · Zuhör-Schritt stoppen: Avatar klicken oder Alt+Q drücken'
  - Tipp · Andere Apps nutzen während PerkySue denkt — du musst nicht warten
  - 'Smart Focus: starten, weitermachen, Text landet an der richtigen Stelle'
  - Tipp · CPU? Whisper small (schnell) oder medium (präzise). ⚙️ → STT-Modell
  - Tipp · Umgebungslärm? Kein Auto-Stop — Alt+Q oder Avatar
  - Tipp · System-Prompt jedes Modus unter Prompts bearbeiten — PerkySue anpassen
  - Tipp · Whisper vertippt sich? Wort zu STT Keywords unter Prompts hinzufügen
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
