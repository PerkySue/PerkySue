  hero:
    title: PerkySue
    tagline: Sprache-zu-Text mit KI-Power. 100 % lokal. 100 % privat.
    subtitle: Drück ein Kürzel, sprich, und der Text erscheint direkt wo dein Cursor ist — in jeder App, jedem Fenster, jedem Textfeld. Kein Cloud. Kein Konto. Deine Daten verlassen nie deinen PC.
  why_exists:
    section_title: Warum PerkySue existiert
    line_1: Alle anderen Diktierwerkzeuge lösen nur die halbe Aufgabe.
    line_2: Sie wandeln deine Stimme in Wörter um — aber denken nicht mit dir.
    line_3: Du kopierst Text in einen Chatbot, wartest, dann kopierst du die Antwort zurück. Mehrere Schritte für etwas, das eigentlich nur ein Schritt sein sollte — und deine Wörter sind gerade auf einem Server gelandet, den du nicht kontrollierst.
    line_4: PerkySue ist die ganze Pipeline in einem einzigen Kürzel.
    line_5: Spracherkennung, lokale LLM-Transformation und Text-Injektion — in einem Schuss, in jeder App, ohne dass etwas dein Gerät verlässt.
    line_6: Stimme ist keine neutrale Datei — sie ist biometrisch.
    line_7: Sie trägt deinen Akzent, deinen Rhythmus, deinen emotionalen Zustand. Cloud-Diktiertools erfassen sie, übertragen sie und speichern sie zu Bedingungen, die die meisten nie lesen. Sie wird zum Training von Modellen genutzt und mit Infrastrukturpartnern geteilt.
    line_8: PerkySue erfasst Audio im RAM, verarbeitet es lokal und löscht es sofort. Nichts wird gespeichert, protokolliert oder übertragen.
    line_9: Deine Stimme bleibt deine.
  how_it_works:
    section_title: So funktioniert's
    step1_title: Kürzel drücken
    step1_description: 'Setz deinen Cursor in eine App, wo du normalerweise tippst (Word, Gmail, Slack, VS Code…) und drück:'
    step2_title: Natürlich sprechen
    step2_description: PerkySue hört zu, bis du aufhörst zu sprechen. Umgebungslärm kann Auto-Stop verhindern — drück Alt+Q (globaler Standard) oder Esc, wenn die App im Fokus ist, oder klick das Profilbild.
    step3_title: Text erscheint wo du's gestartet hast
    step3_description: PerkySue sperrt deinen Cursor und das aktive Fenster in dem Moment, in dem du das Kürzel drückst.
    step4_title: Weiterarbeiten während's läuft
    step4_description: Tabs wechseln, woanders tippen. Smart Focus injiziert das Ergebnis wo du angefangen hast.
  features:
    section_title: Was Leute damit machen
    transcribe:
      card_title: 🎙️ Transkribieren — gratis, für immer
      badge: Alt+T
      description: Sprich, und das Rohtranskript erscheint bei deinem Cursor. Läuft auf jedem PC — wähl Whisper-Modelle von tiny (ältere Hardware, 4 GB RAM) bis large-v3 (Studioqualität auf modernen GPUs). Kein LLM, kein Abo, kein Wortlimit.
    improve:
      card_title: ✏️ Verbessern — schreib um, was du auswählst
      badge: Alt+I
      description: Du tippst an einem Dokument und ein Absatz zieht nicht — die Idee stimmt, aber der Text ist flach. Markier ihn, drück Alt+I und sag "mach das knackiger und halb so lang". PerkySue liest deine Auswahl und deine Anweisung gleichzeitig. Der umgeschriebene Absatz ersetzt das Original, direkt, ohne die App zu verlassen.
      prompt: 🎤  "mach das fesselnder, die aktuelle Version ist zu trocken"
      result: ✅  Deine Auswahl wird durch die verbesserte Version ersetzt.
    professional:
      card_title: 💼 Professionell — Ton und Fehler in einem Schritt fixen
      badge: Alt+P
      description: Du hast zwei Absätze geschrieben, die lässigen Stil mit Tippfehlern mischen. Markier sie, drück Alt+P und sag "räum das auf, das ist für eine Vorstandspräsentation". Der LLM schreibt formell um und korrigiert Fehler — deine Auswahl wird ersetzt, kein Clipboard-Jonglieren nötig.
      prompt: 🎤  "das muss poliert klingen, Grammatik auch fixen"
      result: ✅  Deine Auswahl wird durch eine formelle, korrigierte Version ersetzt.
  use_cases:
    section_title: Mehr Sprachmodi in Aktion
    intro: Jeder Modus funktioniert als Sprachbefehl — keine Textauswahl nötig. Kürzel drücken, sprechen, Ergebnis erscheint bei deinem Cursor.
    footer: Alle Modi laufen komplett auf deinem PC. Kein API-Aufruf, kein Internet, keine Daten verlassen dein Gerät.
    items:
    - badge: Alt+M
      name: E-Mail — sag's, schick's
      prompt: 🎤  "schreib eine E-Mail an John, dass PerkySue bereit zum Launch ist — erwähn, dass wir nächste Woche einen Soft-Launch planen"
      result: ✅  Eine professionelle, gut formatierte E-Mail erscheint bei deinem Cursor. PerkySue schreibt in der Sprache, die du sprichst.
    - badge: Alt+D
      name: Direktnachricht — locker, bereit zum Senden
      prompt: 🎤  "sag Oma, sie soll die Sojasoße nicht vergessen"
      result: ✅  Oma! Kurze Erinnerung — vergiss die Sojasoße nicht! Schönen Tag noch!
    - badge: Alt+X
      name: Social Post — posten oder antworten
      prompt: 🎤  "antworte auf diesen YouTube-Kommentar — sag danke und dass nächste Woche ein Video über das Plugin-System kommt"
      result: ✅  Vielen Dank! Freut mich wirklich, dass es dir gefallen hat. Nächste Woche kommt das Plugin-System-Video. Bleib dran!
    - badge: Alt+C
      name: Konsole — beschreib's, krieg den Befehl
      prompt: 🎤  "alle Python-Dateien finden, die in den letzten 7 Tagen geändert wurden"
      result: ✅  find . -name "*.py" -mtime -7 — bereit zum Einfügen ins Terminal.
    - badge: Alt+A
      name: Ask — Q&A mit Gesprächsgedächtnis
      prompt: 🎤  "was ist der Unterschied zwischen einem Mutex und einem Semaphor?"
      result: ✅  Die Antwort wird bei deinem Cursor eingefügt. Stell eine Folgefrage — das Modell merkt sich den Verlauf.
    - badge: Alt+V/B/N
      name: Eigene Prompts — deine Regeln, deine Workflows
      prompt: 🎤  Drei benutzerdefinierte Prompt-Slots, die du unter Prompts bearbeiten kannst.
      result: ✅  Wandle Sprache in Besprechungsnotizen, Schreibstil, strukturierte Ausgabe um — was immer du brauchst.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — abfeuern und vergessen
    description: PerkySue merkt sich deine Cursorposition in dem Moment, in dem du das Kürzel drückst. Während Whisper transkribiert und der LLM generiert, kannst du Apps wechseln, weitertippen, machen was du willst. Das Ergebnis landet wo du's gestartet hast — nicht wo dein Cursor jetzt ist.
