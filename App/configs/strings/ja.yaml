header_tips:
  startup_message: ヒント · Word、Gmail、Slack…にカーソルを置いてAlt+Tを押してみて
  tips:
  - ヒント · Alt+Qを押すかアバターをクリックして手動で録音停止
  - ヒント · Alt+Tはずっと無料 — 高速文字起こし、LLM不要
  - ヒント · テキストを選択してAlt+I、何を変えたいか話すだけ
  - ヒント · Alt+Mを押してメール全体を声で書き起こす
  - Alt+A Pro：チャットで続きを保持 — Alt+A無料：1問ずつ
  - ヒント · 周囲の音で自動停止しない？ Alt+Qを押して
  - ヒント · パラグラフを選択 → Alt+P — トーンと文法を一発で修正
  - ヒント · Alt+C：ターミナルで普通の言葉でやりたいことを説明して
  - ヒント · Alt+L：テキストを選択して別の言語に翻訳するよう頼む
  - ヒント · Alt+D：WhatsApp、Slack、Discord、SMS向けメッセージを声で作る
  - ヒント · Alt+X：LinkedIn、X、YouTube向けの投稿や返信を作る
  - ヒント · 議事録を貼り付けて選択、Alt+Sで短い要約に
  - ヒント · 雑なテキストを選択してAlt+I、「短くして」と言えば完了
  - ヒント · Alt+V〜Alt+N = 自分だけのカスタムPrompts。Prompt Modesで編集できる
  - ヒント · コメントにブランドのトーンで返信するカスタムPromptを作ろう
  - ヒント · 同じプロンプトを繰り返してる？カスタムPromptにしちゃおう
  - ヒント · カスタムPromptアイデア：メモをフックのあるLinkedIn投稿に変換
  - ヒント · カスタムPromptでKling/Runway用の動画プロンプトを整形する
  - ヒント · カスタムPromptアイデア：テキストからアクションと締め切りを抽出
  - ヒント · Alt+H：ヘルプタブでPerkySueに何でも聞いてみて
  - Pro · Smart Focusが貼り付けなかった場合はコンソールタブから出力をコピー
  - ヒント · 録音停止はアバターをクリックかAlt+Qで
  - ヒント · PerkySueが考えている間も別の作業をしてOK — 待たなくていい
  - Smart Focus：起動したら別の作業へ — 結果は起動した場所に届く
  - ヒント · CPUのみ？Whisper small（速い）かmedium（正確）を使ってみて。⚙️ → STTモデル
  - ヒント · 周囲の音で録音が止まらない？ Alt+Qかアバターをクリックして
  - ヒント · 各モードのプロンプトをPrompt Modesで編集して自分仕様に
  - ヒント · Whisperが単語を間違える？Prompt Modesの STTキーワードに追加して
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
