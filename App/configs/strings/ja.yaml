    footer: ローカル実行 — テキストはあなたのマシンに残ります。
  hero:
    title: PerkySue
    tagline: 音声入力×AIの力。100%ローカル。100%プライベート。
    subtitle: ホットキーを押して話すだけ — カーソルのある場所にテキストが届く。どんなアプリでも、どんなウィンドウでも、どんな入力欄でも。クラウドなし。アカウントなし。データは絶対に外に出ない。
  why_exists:
    section_title: PerkySueが生まれた理由
    line_1: 他の音声入力ツールは、問題の半分しか解決しない。
    line_2: 声をテキストに変えるだけで、一緒に考えてはくれない。
    line_3: テキストをチャットボットにコピーして、待って、また貼り付ける。本来ひとつで済むはずのことに何ステップもかかる — しかも自分のコントロール外のサーバーに言葉が送られていく。
    line_4: PerkySueは、パイプライン全体をたったひとつのホットキーで完結させる。
    line_5: 音声認識、ローカルLLMによる変換、テキスト注入 — 一発で、どんなアプリでも、何も外に送らずに。
    line_6: 音声はただのデータじゃない — バイオメトリクスデータだ。
    line_7: アクセント、リズム、感情状態まで含まれている。クラウドの音声入力ツールはそれを取得・転送し、ほとんどの人が読まない規約のもとで保持する。モデルの学習に使われ、インフラパートナーと共有される。
    line_8: PerkySueはRAMで音声をキャプチャし、ローカルで処理して即座に削除する。保存も、記録も、送信もされない。
    line_9: 声はずっと自分のもの！
  how_it_works:
    section_title: 使い方
    step1_title: ホットキーを押す
    step1_description: いつも入力している場所（Word、Gmail、Slack、VS Code…）にカーソルを置いて押すだけ：
    step2_title: 自然に話す
    step2_description: PerkySueは話し終わるまで録音する。周囲の音で自動停止しない場合はAlt+Q（グローバルデフォルト）か、アプリにフォーカスがある時はEscを押すか、プロフィール画像をクリックして。
    step3_title: テキストが起動した場所に届く
    step3_description: ホットキーを押した瞬間のカーソル位置とウィンドウをPerkySueがロックする。
    step4_title: 処理中も作業を続けられる
    step4_description: タブを切り替えても、別の場所でタイプしてもOK。Smart Focusが結果を起動した場所に注入する。
  features:
    section_title: みんなの使い方
    transcribe:
      card_title: 🎙️ 文字起こし — 無料、ずっと
      badge: Alt+T
      description: 話すと、そのままの文字起こしがカーソル位置に届く。どんなマシンでも動く — Whisperモデルはtiny（古いPC、4GB RAM）からlarge-v3（最新GPUでスタジオ品質）まで選べる。LLM不要、サブスク不要、文字数制限なし。
    improve:
      card_title: ✏️ 改善 — 選択したテキストを書き直す
      badge: Alt+I
      description: ドキュメントを書いていて、あるパラグラフがしっくりこない — アイデアはいいのに文章が決まらない。選択してAlt+Iを押し、「もっとパンチがある感じにして、半分に削って」と話すだけ。PerkySueは選択テキストと声の指示を同時に読む。書き直されたパラグラフがアプリを離れずにその場で置き換わる。
      prompt: 🎤  「もっと引きつける感じにして、今のは少し固い」
      result: ✅  選択したテキストが改善版に置き換わる。
    professional:
      card_title: 💼 プロフェッショナル — トーンとミスを一度に修正
      badge: Alt+P
      description: カジュアルな言い回しとタイポが混在したパラグラフを書いた。役員会のレポートに使う必要がある。選択してAlt+Pを押し、「きちんとした感じに直して、文法もチェックして」と話すと、LLMがフォーマルに書き直してミスも修正 — クリップボードを触らずに選択テキストが置き換わる。
      prompt: 🎤  「洗練された感じにして、文法も直して」
      result: ✅  選択したテキストが正式版に置き換わる。
  use_cases:
    section_title: 他の音声モードも試してみよう
    intro: 各モードは音声コマンドとして使える — テキスト選択は不要。ホットキーを押して話せば、結果がカーソル位置に届く。
    footer: すべてのモードはPC上で完全に動作する。API呼び出しなし、インターネットなし、データは外に出ない。
    items:
    - badge: Alt+M
      name: メール — 話して、送る
      prompt: 🎤  「PerkySueの準備ができたことをJohnにメールで伝えて — 来週ソフトリリースを予定していることも添えて」
      result: ✅  きちんと整形されたプロのメールがカーソル位置に届く。PerkySueは話した言語で書く。
    - badge: Alt+D
      name: ダイレクトメッセージ — フレンドリーに、すぐ送れる
      prompt: 🎤  「おじいちゃんに醤油忘れないでって伝えて」
      result: ✅  おじいちゃん！醤油忘れないでね！いい一日を！
    - badge: Alt+X
      name: SNS投稿 — どのプラットフォームにも対応
      prompt: 🎤  「このYouTubeコメントに返信して — ありがとうって言って、次の動画はプラグインシステムについて来週出るって伝えて」
      result: ✅  ありがとう！楽しんでもらえてうれしい。次の動画は来週 — プラグインシステムに深く入るよ。お楽しみに！
    - badge: Alt+C
      name: コンソール — 説明したらコマンドが出てくる
      prompt: 🎤  「過去7日間に変更されたPythonファイルを全部探して」
      result: ✅  find . -name "*.py" -mtime -7 — ターミナルにペーストするだけ。
    - badge: Alt+A
      name: Ask — 会話の記憶付きQ&A
      prompt: 🎤  「mutexとsemaphoreの違いは？」
      result: ✅  カーソル位置に答えが届く。追加で質問しても大丈夫 — モデルは会話の履歴を覚えている。
    - badge: Alt+V/B/N
      name: カスタムPrompts — 自分のルールで
      prompt: 🎤  Prompt Modesで編集できるプロンプトスロットが3つ。
      result: ✅  議事録、独自の文体、構造化された出力 — 何でも自分仕様に。
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — 起動したら任せてOK
    description: PerkySueはホットキーを押した瞬間のカーソル位置を記憶する。Whisperが文字起こしし、LLMが生成している間、アプリを切り替えても、他の場所でタイプしても自由。結果は今カーソルがある場所じゃなく、起動した場所に届く。
  voice_modes:
    section_title: 音声モード
    modes:
    - hotkey: Alt+T
      name: 文字起こし
      description: 高速文字起こし（LLM不要）
      needs_llm: false
    - hotkey: Alt+I
      name: 改善
      description: テキストの整理とフォーマット
      needs_llm: true
    - hotkey: Alt+P
      name: プロフェッショナル
      description: フォーマルなビジネス向け書き直し
      needs_llm: true
    - hotkey: Alt+L
      name: 翻訳
      description: 設定した言語に翻訳
      needs_llm: true
    - hotkey: Alt+C
      name: コンソール
      description: シェルコマンドを生成
      needs_llm: true
    - hotkey: Alt+M
      name: メール
      description: プロのメールとして整形
      needs_llm: true
    - hotkey: Alt+D
      name: ダイレクトメッセージ
      description: WhatsApp/Slack/Discord/SMS — 関係に合わせたトーン
      needs_llm: true
    - hotkey: Alt+X
      name: SNS投稿
      description: LinkedIn/X/YouTube/Reddit — 投稿または返信
      needs_llm: true
    - hotkey: Alt+S
      name: 要約
      description: 要点をまとめる
      needs_llm: true
    - hotkey: Alt+A
      name: Ask
      description: 質問する — LLMがカーソル位置に答える
      needs_llm: true
    - hotkey: Alt+H
      name: ヘルプ
      description: PerkySueについて聞く — アプリKB + 設定
      needs_llm: true
    - hotkey: Alt+G
      name: GenZ
      description: カジュアルでいまどきな書き直し
      needs_llm: true
  competition:
    section_title: PerkySue vs. 競合
    items:
    - title: vs. 内蔵音声入力
      examples: Windows、macOS、Google
      description: あっちは文字にするだけ。PerkySueは文字にして考える — 11モードが声をメール、コマンド、翻訳、要約に変える。
    - title: vs. クラウド音声入力
      examples: Wispr Flow、Typeless
      description: 音声は絶対に外に出ない。アカウントなし、インターネットなし、文字数制限なし。機内モードでもUSBスティックでも動く。
    - title: vs. オープンソースツール
      examples: Amical、OpenWhispr
      description: あっちはSTT+ペーストだけ。PerkySueはローカルLLMパイプライン、テキスト選択+音声指示、Smart Focus、GUIウィジェットを追加している。
  privacy:
    section_title: プライバシー
    items:
    - icon: 🔒
      title: インターネット不要
      description: すべて自分のPC上で動く
    - icon: 🔇
      title: 音声は保存されない
      description: RAMでキャプチャ、文字起こし、即削除
    - icon: 👤
      title: アカウント不要
      description: 登録なし、トラッキングなし、クッキーなし
    - icon: 📂
      title: オープンソース
      description: コードを自分で全行確認できる
  why_i_built_it:
    section_title: なぜPerkySueを作ったのか
    paragraph_1: PerkySueは個人の生産性ツールとして始まった — ピッチデッキのためではなく、毎日自分が必要としていたもの。何年もソフトウェアアーキテクチャと会話型プラットフォームを設計してきた経験を活かして、ひとつのパイプラインに集約したかった：音声 → ローカルSTT → ローカルLLM → 作業中の場所にテキスト注入。
    paragraph_2: コードはAIと共同開発した：このプロジェクトはAIプログラミングアシスタントとの継続的なコラボレーションを含んでいる。ローカルパイプラインは複雑だ。おもしろいことに、今日PerkySueは自分自身のコードを書くのを手伝ってくれている — 声もデータもクラウドに送らずに。
  links:
    section_title: リンク
    items:
    - label: GitHubリポジトリ
      url: https://github.com/PerkySue/PerkySue
    - label: Discordコミュニティ
