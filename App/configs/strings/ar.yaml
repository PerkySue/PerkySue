header_tips:
  startup_message: نصيحة · ضع مؤشرك في Word أو Gmail أو Slack… ثم اضغط Alt+T
  tips:
  - نصيحة · اضغط Alt+Q أو انقر على الأفاتار لإيقاف التسجيل يدوياً
  - نصيحة · Alt+T مجاني للأبد — نسخ سريع، لا يحتاج LLM
  - نصيحة · حدد أي نص، اضغط Alt+I، وقل ما تريد تغييره
  - نصيحة · اضغط Alt+M في أي مكان لإملاء بريد إلكتروني كامل
  - 'Alt+A Pro: يتابع المحادثة في الدردشة — Alt+A المجاني: سؤال واحد في المرة'
  - نصيحة · الضوضاء تمنع الإيقاف التلقائي؟ اضغط Alt+Q للإيقاف
  - نصيحة · حدد فقرة ← Alt+P — صحّح الأسلوب والقواعد دفعة واحدة
  - 'نصيحة · Alt+C في طرفيتك: صِف ما تريده بلغة عادية'
  - 'نصيحة · Alt+L: حدد أي نص واطلب ترجمته إلى أي لغة'
  - 'نصيحة · Alt+D: أمْلِ رسالة مباشرة لـ WhatsApp، Slack، Discord، SMS'
  - 'نصيحة · Alt+X: أنشئ منشوراً أو رداً لـ LinkedIn، X، YouTube، Reddit'
  - نصيحة · الصق ملاحظات اجتماع، حددها، Alt+S لملخص مختصر
  - نصيحة · حدد نصاً خاماً، Alt+I، قل «اختصر هذا» — انتهى
  - نصيحة · Alt+V إلى Alt+N = Prompts مخصصة. عدّلها في Prompt Modes
  - نصيحة · أنشئ Prompt مخصصاً للرد على التعليقات بأسلوب علامتك
  - نصيحة · متعب من إعادة كتابة نفس الـ Prompts؟ اصنع Prompt مخصصاً
  - 'نصيحة · فكرة Prompt: حوّل الملاحظات إلى منشور LinkedIn جذاب'
  - نصيحة · استخدم Prompts مخصصة لتوليد Prompts فيديو Kling/Runway
  - 'نصيحة · فكرة Prompt: استخرج المهام والمواعيد النهائية من نص'
  - 'نصيحة · Alt+H: اسألني أي شيء عن PerkySue في تبويب المساعدة'
  - Pro · إذا لم يلصق Smart Focus، انسخ المخرجات من تبويب الكونسول
  - نصيحة · أوقف خطوة الاستماع بالنقر على الأفاتار أو Alt+Q
  - نصيحة · بدّل التطبيقات أثناء تفكير PerkySue — لا داعي للانتظار
  - 'Smart Focus: اضغط، افعل شيئاً آخر، النص يصل في المكان الصحيح'
  - نصيحة · CPU فقط؟ جرب Whisper small (سريع) أو medium (دقيق). ⚙️ ← نموذج STT
  - نصيحة · ضوضاء؟ التسجيل لا يتوقف تلقائياً؟ — Alt+Q أو انقر الأفاتار
  - نصيحة · عدّل Prompt أي وضع في Prompt Modes — اجعل PerkySue لك
  - نصيحة · Whisper يخطئ في كلمة؟ أضفها إلى كلمات STT المفتاحية في Prompt Modes
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
