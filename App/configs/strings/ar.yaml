    custom_prompts: 'قوالب مخصّصة: Alt+V/B/N = 3 خانات — سير عمل قابل لإعادة الاستخدام بقواعدك ونبرتك.'
    footer: يعمل محليًا — يبقى نصّك على جهازك.
  hero:
    title: PerkySue
    tagline: تحويل صوتك لنص بقوة الذكاء الاصطناعي. 100% محلي. 100% خاص.
    subtitle: اضغط اختصاراً، تكلّم، ويظهر النص مباشرة حيث يقف مؤشرك — في أي تطبيق، أي نافذة، أي حقل نص. بدون سحابة. بدون حساب. بياناتك لا تغادر جهازك أبداً.
  why_exists:
    section_title: لماذا PerkySue؟
    line_1: كل أدوات الإملاء الأخرى تحل نصف المشكلة فقط.
    line_2: تحوّل صوتك إلى كلمات — لكنها لا تفكر معك.
    line_3: لا تزال تنسخ نصاً إلى chatbot، تنتظر، ثم تنسخ الرد. خطوات كثيرة لشيء يجب أن يكون بخطوة واحدة — وكلماتك سافرت إلى خادم لا تتحكم فيه.
    line_4: PerkySue هو كل هذا Pipeline في اختصار واحد.
    line_5: التعرف على الكلام، تحويل LLM المحلي، وحقن النص — بضغطة واحدة، في أي تطبيق، بدون إرسال أي شيء للخارج.
    line_6: الصوت ليس بياناً عادياً — إنه بيانات بيومترية.
    line_7: يحمل لهجتك، إيقاعك، حالتك العاطفية. أدوات الإملاء السحابية تلتقطه وترسله وتحتفظ به بشروط لا يقرأها أحد. يُستخدم لتدريب النماذج ويُشارك مع شركاء البنية التحتية.
    line_8: PerkySue يلتقط الصوت في RAM، يعالجه محلياً، ويحذفه فوراً. لا شيء يُخزَّن أو يُسجَّل أو يُرسَل.
    line_9: صوتك يبقى لك!
  how_it_works:
    section_title: كيف يعمل
    step1_title: اضغط اختصاراً
    step1_description: 'ضع مؤشرك في أي تطبيق تكتب فيه (Word، Gmail، Slack، VS Code…) واضغط:'
    step2_title: تكلّم بشكل طبيعي
    step2_description: PerkySue يسجّل حتى تتوقف عن الكلام. الضوضاء المحيطة قد تمنع الإيقاف التلقائي — اضغط Alt+Q (الافتراضي العالمي) أو Esc عندما يكون التطبيق في المقدمة، أو انقر على صورة الملف الشخصي.
    step3_title: النص يظهر حيث بدأت
    step3_description: PerkySue يقفل على مؤشرك والنافذة النشطة لحظة الضغط على الاختصار.
    step4_title: واصل العمل أثناء المعالجة
    step4_description: بدّل التبويبات، اكتب في مكان آخر. Smart Focus يحقن النتيجة حيث بدأت.
  features:
    section_title: ماذا يفعل المستخدمون به
    transcribe:
      card_title: 🎙️ نسخ — مجاني، للأبد
      badge: Alt+T
      description: تكلّم، ويظهر النص الخام عند مؤشرك. يعمل على أي جهاز — اختر نماذج Whisper من tiny (أجهزة قديمة، 4 جيجا RAM) إلى large-v3 (دقة احترافية على GPU حديث). لا يحتاج LLM، لا اشتراك، لا حد للكلمات.
    improve:
      card_title: ✏️ تحسين — أعِد كتابة ما تحدده
      badge: Alt+I
      description: تكتب مستنداً وفقرة ما تبدو مسطحة — الفكرة موجودة لكن الكتابة لا تصل. حددها، اضغط Alt+I، وقل "اجعل هذا أقوى واختصره للنصف". PerkySue يقرأ نصك المحدد وتعليماتك الصوتية معاً. الفقرة المُعاد كتابتها تحل محل الأصلية، في مكانها، بدون مغادرة التطبيق.
      prompt: 🎤  "اجعل هذا أكثر جاذبية، النسخة الحالية جافة جداً"
      result: ✅  نصك المحدد يُستبدل بالنسخة المحسّنة.
    professional:
      card_title: 💼 احترافي — صحّح الأسلوب والأخطاء دفعة واحدة
      badge: Alt+P
      description: كتبت فقرتين تمزجان أسلوباً غير رسمي مع بعض الأخطاء. حددهما، اضغط Alt+P، وقل "نظّف هذا، أحتاجه لعرض مجلس الإدارة". LLM يُعيد الكتابة بأسلوب رسمي ويصحح الأخطاء — نصك المحدد يُستبدل، بدون لمس الحافظة.
      prompt: 🎤  "يجب أن يبدو هذا مصقولاً، صحّح القواعد أيضاً"
      result: ✅  نصك المحدد يُستبدل بنسخة رسمية مصحّحة.
  use_cases:
    section_title: أوضاع صوتية أخرى في العمل
    intro: كل وضع يعمل كأمر صوتي — لا تحتاج لتحديد نص. اضغط الاختصار، تكلّم، وتظهر النتيجة عند مؤشرك.
    footer: كل الأوضاع تعمل كلياً على جهازك. لا طلب API، لا إنترنت، لا بيانات تغادر جهازك.
    items:
    - badge: Alt+M
      name: بريد إلكتروني — قله، أرسله
      prompt: 🎤  "اكتب بريداً لـ John يخبره أن PerkySue جاهزة للإطلاق — اذكر أننا نستهدف إصداراً هادئاً الأسبوع القادم"
      result: ✅  بريد إلكتروني احترافي ومنسق يظهر عند مؤشرك. PerkySue يكتب بالغة التي تتكلم بها.
    - badge: Alt+D
      name: رسالة مباشرة — ودية، جاهزة للإرسال
      prompt: 🎤  "قل لجدو ما ينسى صلصة الصويا"
      result: ✅  جدو! تذكير سريع — ما تنسى صلصة الصويا! يوم سعيد!
    - badge: Alt+X
      name: منشور سوشيال — للنشر أو الرد على أي منصة
      prompt: 🎤  "رد على هذا التعليق في YouTube — قل شكراً والفيديو القادم الأسبوع القادم عن نظام الإضافات"
      result: ✅  شكراً جزيلاً! سعيد أنك استمتعت به. الفيديو القادم الأسبوع الجاي — نغوص في نظام الإضافات. ترقّب!
    - badge: Alt+C
      name: كونسول — صِف الأمر، احصل على الأمر
      prompt: 🎤  "ابحث عن كل ملفات Python المعدّلة في آخر 7 أيام"
      result: ✅  find . -name "*.py" -mtime -7 — جاهز للصق في الطرفية.
    - badge: Alt+A
      name: Ask — سؤال وجواب مع ذاكرة المحادثة
      prompt: 🎤  "ما الفرق بين mutex و semaphore؟"
      result: ✅  الإجابة تُحقن عند مؤشرك. اسأل سؤالاً متابعاً — النموذج يحتفظ بتاريخ المحادثة.
    - badge: Alt+V/B/N
      name: Prompts مخصصة — قواعدك، تدفق عملك
      prompt: 🎤  ثلاثة فتحات Prompts قابلة للتعديل في Prompt Modes.
      result: ✅  حوّل كلامك إلى ملاحظات اجتماع، أسلوب كتابة محدد، مخرجات منظمة — ما تحتاج.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — شغّل وانسَ
    description: PerkySue يقفل على موضع مؤشرك لحظة الضغط على الاختصار. بينما Whisper ينسخ وLLM يولّد، أنت حر — بدّل التطبيقات، واصل الكتابة، افعل ما تشاء. النتيجة تصل حيث ضغطت — لا حيث مؤشرك الآن.
  voice_modes:
    section_title: الأوضاع الصوتية
    modes:
    - hotkey: Alt+T
      name: نسخ
      description: نسخ سريع (بدون LLM)
      needs_llm: false
    - hotkey: Alt+I
      name: تحسين
      description: تنظيف النص وإعادة تنسيقه
      needs_llm: true
    - hotkey: Alt+P
      name: احترافي
      description: إعادة كتابة رسمية واحترافية
      needs_llm: true
    - hotkey: Alt+L
      name: ترجمة
      description: ترجمة إلى اللغة المستهدفة
      needs_llm: true
    - hotkey: Alt+C
      name: كونسول
      description: استخراج أمر shell
      needs_llm: true
    - hotkey: Alt+M
      name: بريد إلكتروني
      description: تنسيق كبريد احترافي
      needs_llm: true
    - hotkey: Alt+D
      name: رسالة مباشرة
      description: WhatsApp/Slack/Discord/SMS — أسلوب يتكيف مع العلاقة
      needs_llm: true
    - hotkey: Alt+X
      name: منشور سوشيال
      description: LinkedIn/X/YouTube/Reddit — نشر أو رد
      needs_llm: true
    - hotkey: Alt+S
      name: تلخيص
      description: ضغط النص في نقاط أساسية
      needs_llm: true
    - hotkey: Alt+A
      name: Ask
      description: اسأل سؤالاً — LLM يجيب عند مؤشرك
      needs_llm: true
    - hotkey: Alt+H
      name: مساعدة
      description: اسأل عن PerkySue — KB التطبيق + إعداداتك
      needs_llm: true
    - hotkey: Alt+G
      name: GenZ
      description: إعادة كتابة عصرية وغير رسمية
      needs_llm: true
  competition:
    section_title: PerkySue مقابل المنافسين
    items:
    - title: مقابل الإملاء المدمج
      examples: Windows, macOS, Google
      description: هم ينسخون الكلمات. PerkySue ينسخ ويفكر — 11 وضعاً تحوّل كلامك إلى بريد، أوامر، ترجمات، ملخصات.
    - title: مقابل الإملاء السحابي
      examples: Wispr Flow, Typeless
      description: صوتك لا يغادر جهازك أبداً. لا حساب، لا إنترنت، لا حد للكلمات. يعمل في وضع الطائرة وعلى USB.
    - title: مقابل الأدوات مفتوحة المصدر
      examples: Amical, OpenWhispr
      description: هم يفعلون STT + لصق. PerkySue يضيف pipeline LLM محلي، تحديد نص + تعليمات صوتية، Smart Focus، وواجهة GUI.
  privacy:
    section_title: الخصوصية
    items:
    - icon: 🔒
      title: لا يحتاج إنترنت
      description: كل شيء يعمل على جهازك
    - icon: 🔇
      title: الصوت لا يُخزَّن أبداً
      description: يُلتقط في RAM، يُنسخ، يُحذف فوراً
    - icon: 👤
      title: لا حساب مطلوب
      description: لا تسجيل، لا تتبع، لا كوكيز
    - icon: 📂
      title: مفتوح المصدر
      description: افحص كل سطر من الكود بنفسك
  why_i_built_it:
    section_title: لماذا بنيت PerkySue؟
    paragraph_1: 'بدأ PerkySue كأداة إنتاجية شخصية — شيء احتجته على جهازي كل يوم، لم يكن عرض pitch أولاً. بعد سنوات من تصميم معماريات البرمجيات والمنصات الحوارية، أردت pipeline واحداً: صوت → STT محلي → LLM محلي → نص يُحقن حيث أعمل.'
    paragraph_2: 'الكود طُوِّر بالتعاون مع الذكاء الاصطناعي: المشروع تضمّن تعاوناً مستمراً مع مساعدي برمجة AI. الـ pipeline المحلي معقد. والمضحك أن PerkySue يساعدني اليوم في كتابة كوده الخاص، بدون إرسال صوتي أو بياناتي للسحابة.'
  links:
    section_title: روابط
    items:
    - label: مستودع GitHub
      url: https://github.com/PerkySue/PerkySue
    - label: مجتمع Discord
      url: https://discord.gg/UaJHEzFgXy
    - label: ادعمنا على Patreon ❤
      url: https://patreon.com/PerkySue
    - label: سياسة الخصوصية
      url: ''
    - label: توثيق المعمارية
      url: ''
    credit: صنعه Jérôme Corbiau  ·  رخصة Apache 2.0
