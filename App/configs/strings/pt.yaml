    custom_prompts: 'Prompts personalizados: Alt+V/B/N = 3 slots — workflows reutilizáveis com as tuas regras e tom.'
    footer: Funciona localmente — o teu texto fica na tua máquina.
  hero:
    title: PerkySue
    tagline: Voz para texto com superpoderes de IA. 100% local. 100% privado.
    subtitle: Pressiona um atalho, fala, e o texto aparece onde está o cursor — em qualquer app, janela ou campo de texto. Sem cloud. Sem conta. Os teus dados nunca saem da tua máquina.
  why_exists:
    section_title: Por que existe o PerkySue
    line_1: Todas as outras ferramentas de ditado resolvem só metade do problema.
    line_2: Transformam a tua voz em palavras — mas não pensam contigo.
    line_3: Ainda copias texto para um chatbot, esperas, e copias a resposta de volta. São vários passos para algo que devia ser um só — e as tuas palavras acabaram de viajar para um servidor que não controlas.
    line_4: O PerkySue é toda a pipeline num único atalho.
    line_5: Reconhecimento de voz, transformação por LLM local, e injeção de texto — tudo de uma vez, em qualquer app, sem nada sair do teu dispositivo.
    line_6: A voz não é um dado neutro — é biométrico.
    line_7: Carrega o teu sotaque, o teu ritmo, o teu estado emocional. As ferramentas de ditado cloud capturam-na, transmitem-na e guardam-na em condições que a maioria nunca lê. É usada para treinar modelos e partilhada com parceiros de infraestrutura.
    line_8: O PerkySue captura o áudio na RAM, processa-o localmente e descarta-o imediatamente. Nada é guardado, registado ou transmitido.
    line_9: A tua voz continua a ser tua.
  how_it_works:
    section_title: Como funciona
    step1_title: Pressionar um atalho
    step1_description: 'Coloca o cursor numa app onde costumas escrever (Word, Gmail, Slack, VS Code…) e pressiona:'
    step2_title: Falar naturalmente
    step2_description: O PerkySue grava até parares de falar. Ruído ambiente pode impedir a paragem automática — pressiona Alt+Q (padrão global) ou Esc quando a app está em foco, ou clica na foto de perfil.
    step3_title: O texto aparece onde ativaste
    step3_description: O PerkySue bloqueia o cursor e a janela ativa no momento em que pressionas o atalho.
    step4_title: Continua a trabalhar enquanto processa
    step4_description: Muda de aba, escreve noutro sítio. O Smart Focus injeta o resultado onde começaste.
  features:
    section_title: Para que as pessoas usam
    transcribe:
      card_title: 🎙️ Transcrever — grátis, para sempre
      badge: Alt+T
      description: Fala, e a transcrição bruta aparece no cursor. Funciona em qualquer máquina — escolhe modelos Whisper de tiny (hardware antigo, 4 GB RAM) a large-v3 (qualidade estúdio em GPUs modernas). Sem LLM, sem subscrição, sem limite de palavras.
    improve:
      card_title: ✏️ Melhorar — reescreve o que selecionas
      badge: Alt+I
      description: Estás a escrever um documento e um parágrafo não está a resultar — a ideia está lá mas o texto está fraco. Seleciona-o, pressiona Alt+I e diz "torna isto mais impactante e corta para metade". O PerkySue lê a seleção e a instrução ao mesmo tempo. O parágrafo reescrito substitui o original, no lugar, sem sair da app.
      prompt: 🎤  "torna isto mais envolvente, a versão atual é demasiado seca"
      result: ✅  A tua seleção é substituída pela versão melhorada.
    professional:
      card_title: 💼 Profissional — corrige tom e erros num só passo
      badge: Alt+P
      description: Escreveste dois parágrafos que misturam linguagem casual com alguns erros. Seleciona-os, pressiona Alt+P e diz "limpa isto, é para uma apresentação ao conselho". O LLM reescreve com formalidade e corrige os erros — a seleção é substituída, sem mexer na área de transferência.
      prompt: 🎤  "isto tem de soar polido, corrige também a gramática"
      result: ✅  A tua seleção é substituída por uma versão formal e corrigida.
  use_cases:
    section_title: Mais modos de voz em ação
    intro: Cada modo funciona como um comando de voz — sem precisar de selecionar texto. Pressiona o atalho, fala, e o resultado aparece no cursor.
    footer: Todos os modos correm inteiramente na tua máquina. Sem chamadas API, sem internet, sem dados a sair do dispositivo.
    items:
    - badge: Alt+M
      name: Email — diz, envia
      prompt: 🎤  "escreve um email ao João a dizer que o PerkySue está pronto para lançar — menciona que estamos a apontar para um lançamento suave na semana que vem"
      result: ✅  Um email profissional e bem formatado aparece no cursor. O PerkySue escreve na língua que falas.
    - badge: Alt+D
      name: Mensagem direta — amigável, pronta a enviar
      prompt: 🎤  "diz à avó para não se esquecer do molho de soja"
      result: ✅  Avó! Só um lembrete rápido — não te esqueças do molho de soja! Bom dia!
    - badge: Alt+X
      name: Post nas redes — publicar ou responder
      prompt: 🎤  "responde a este comentário do YouTube — diz obrigado e que o próximo vídeo sai na semana que vem sobre o sistema de plugins"
      result: ✅  Muito obrigado! Fico contente que tenhas gostado. Próximo vídeo na semana que vem — mergulhamos no sistema de plugins. Fica atento!
    - badge: Alt+C
      name: Consola — descreve, recebe o comando
      prompt: 🎤  "encontra todos os ficheiros Python modificados nos últimos 7 dias"
      result: ✅  find . -name "*.py" -mtime -7 — pronto para colar no terminal.
    - badge: Alt+A
      name: Ask — Q&A com memória de conversa
      prompt: 🎤  "qual é a diferença entre um mutex e um semáforo?"
      result: ✅  A resposta é injetada no cursor. Faz uma pergunta de seguimento — o modelo guarda o histórico da conversa.
    - badge: Alt+V/B/N
      name: Prompts personalizados — as tuas regras, os teus fluxos
      prompt: 🎤  Três slots de prompts personalizáveis para editar em Prompts.
      result: ✅  Transforma voz em notas de reunião, estilo de escrita, output estruturado — o que precisares.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — dispara e esquece
    description: O PerkySue guarda a posição do cursor no momento em que pressionas o atalho. Enquanto o Whisper transcreve e o LLM gera, podes mudar de app, continuar a escrever, fazer o que quiseres. O resultado chega onde começaste — não onde o cursor está agora.
  voice_modes:
    section_title: Modos de voz
    modes:
    - hotkey: Alt+T
      name: Transcrever
      description: Transcrição rápida (sem LLM)
      needs_llm: false
