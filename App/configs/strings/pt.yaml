header_tips:
  startup_message: Dica · Coloca o cursor no Word, Gmail, Slack… e pressiona Alt+T
  tips:
  - Dica · Pressiona Alt+Q ou clica no avatar da sidebar para parar a gravação
  - Dica · Alt+T é grátis para sempre — transcrição rápida, sem limite de palavras
  - Dica · Seleciona texto, Alt+I, e diz o que queres mudar
  - Dica · Pressiona Alt+M em qualquer sítio para ditar um email completo
  - 'Alt+A Pro: mantém o fio no chat — Alt+A grátis: uma pergunta de cada vez'
  - Dica · Ruído ambiente = sem paragem automática? Pressiona Alt+Q para parar
  - Dica · Seleciona um parágrafo → Alt+P — tom e gramática num só passo
  - 'Dica · Alt+C no terminal: descreve o que precisas em linguagem comum'
  - 'Dica · Alt+L: seleciona texto e pede para traduzir para qualquer língua'
  - 'Dica · Alt+D: dita uma mensagem direta para WhatsApp, Slack, Discord, SMS'
  - 'Dica · Alt+X: cria um post ou resposta para LinkedIn, X, YouTube, Reddit'
  - Dica · Cola notas de reunião, seleciona-as, Alt+S para um resumo curto
  - Dica · Seleciona texto de rascunho, Alt+I, diz 'torna isto mais curto' — feito
  - Dica · Alt+V a Alt+N = os teus prompts personalizados. Editar em Prompts
  - Cria um prompt personalizado para responder a comentários no tom da tua marca
  - Farto de reescrever os mesmos prompts de IA? Transforma-os num prompt pessoal
  - 'Dica · Ideia de prompt: transformar notas num post LinkedIn com um gancho'
  - Usa prompts personalizados para gerar prompts de vídeo Kling/Runway formatados
  - 'Dica · Ideia de prompt: extrair tarefas e prazos de um texto'
  - 'Dica · Alt+H: pergunta-me qualquer coisa sobre o PerkySue no separador Ajuda'
  - Pro · Se o Smart Focus não colou, copia o output no separador Consola
  - 'Dica · Para parar a etapa de escuta: clica no avatar ou pressiona Alt+Q'
  - Dica · Faz outras coisas enquanto o PerkySue pensa — não precisas de esperar
  - 'Smart Focus: disparas, continuas, o texto chega no sítio certo'
  - Dica · CPU? Whisper small (rápido) ou medium (preciso). ⚙️ → Modelo STT
  - Dica · Ruído ambiente? A gravação não para sozinha — Alt+Q ou clica no avatar
  - Dica · Edita o prompt de cada modo em Prompts — faz o PerkySue teu
  - Dica · O Whisper erra uma palavra? Adiciona-a às palavras-chave STT em Prompts
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
