      description: Reescrita casual e moderna
      needs_llm: true
  competition:
    section_title: PerkySue vs. Concorrência
    items:
    - title: vs. ditado integrado
      examples: Windows, macOS, Google
      description: Só transcrevem palavras. O PerkySue transcreve e pensa — 11 modos transformam voz em emails, comandos, traduções, resumos.
    - title: vs. ditado cloud
      examples: Wispr Flow, Typeless
      description: O teu áudio nunca sai da máquina. Sem conta, sem internet, sem limite de palavras. Funciona em modo avião ou numa pen USB.
    - title: vs. ferramentas open-source
      examples: Amical, OpenWhispr
      description: Fazem STT + colar. O PerkySue adiciona pipeline LLM local, seleção de texto + instruções de voz, Smart Focus e um widget GUI.
  privacy:
    section_title: Privacidade
    items:
    - icon: 🔒
      title: Sem internet necessária
      description: Tudo corre na tua máquina
    - icon: 🔇
      title: Áudio nunca guardado
      description: Capturado na RAM, transcrito, descartado imediatamente
    - icon: 👤
      title: Sem conta necessária
      description: Sem registo, sem rastreamento, sem cookies
    - icon: 📂
      title: Open source
      description: Inspeciona cada linha de código tu mesmo
  why_i_built_it:
    section_title: Por que o construí
    paragraph_1: 'O PerkySue começou como uma ferramenta de produtividade pessoal — algo de que precisava todos os dias, não um projeto para pitch deck. Depois de anos a desenhar arquiteturas de software e plataformas conversacionais, quis uma só pipeline: voz → STT local → LLM local → texto injetado onde já trabalho.'
    paragraph_2: 'O código foi co-desenvolvido com IA: este projeto envolveu colaboração contínua com assistentes de programação IA. A pipeline local é complexa. Curiosamente, o PerkySue está hoje a ajudar-me a escrever o seu próprio código, sem enviar a minha voz nem os meus dados para a cloud.'
