    custom_prompts: 'Prompts personalizados: Alt+V/B/N = 3 ranuras — flujos reutilizables con tus reglas y tu tono.'
    footer: Funciona en local — tu texto se queda en tu máquina.
  hero:
    title: PerkySue
    tagline: Voz a texto con IA. 100 % local. 100 % privado.
    subtitle: Pulsa un atajo, habla, y el texto aparece donde está tu cursor — en cualquier app, ventana o campo de texto. Sin nube. Sin cuenta. Tus datos nunca salen de tu máquina.
  why_exists:
    section_title: Por qué existe PerkySue
    line_1: Todas las demás herramientas de dictado resuelven solo la mitad del problema.
    line_2: Convierten tu voz en palabras — pero no piensan contigo.
    line_3: Sigues copiando texto en un chatbot, esperando, y luego pegando la respuesta. Son varios pasos para algo que debería ser uno solo — y tus palabras acaban de viajar a un servidor que no controlas.
    line_4: PerkySue es todo el pipeline en un solo atajo.
    line_5: Reconocimiento de voz, transformación con LLM local, e inyección de texto — de una, en cualquier app, sin mandar nada fuera.
    line_6: La voz no es un dato neutro — es biométrico.
    line_7: Lleva tu acento, tu cadencia, tu estado emocional. Las herramientas de dictado en la nube lo capturan, lo transmiten y lo guardan bajo condiciones que casi nadie lee. Se usa para entrenar modelos y se comparte con socios de infraestructura.
    line_8: PerkySue captura el audio en RAM, lo procesa localmente y lo descarta de inmediato. No se almacena, registra ni transmite nada.
    line_9: Tu voz sigue siendo tuya.
  how_it_works:
    section_title: Cómo funciona
    step1_title: Pulsa un atajo
    step1_description: 'Pon el cursor en cualquier app donde escribas (Word, Gmail, Slack, VS Code…) y pulsa:'
    step2_title: Habla con normalidad
    step2_description: PerkySue graba hasta que dejas de hablar. El ruido ambiente puede impedir la parada automática — pulsa Alt+Q (atajo global) o Esc cuando la app esté en primer plano, o haz clic en la foto de perfil.
    step3_title: El texto aparece donde lo lanzaste
    step3_description: PerkySue bloquea tu cursor y la ventana activa en el momento en que pulsas el atajo.
    step4_title: Sigue trabajando mientras procesa
    step4_description: Cambia de pestaña, escribe en otro sitio. Smart Focus inyecta el resultado donde empezaste.
  features:
    section_title: Para qué lo usa la gente
    transcribe:
      card_title: 🎙️ Transcribir — gratis, para siempre
      badge: Alt+T
      description: Habla, y la transcripción en bruto aparece en tu cursor. Funciona en cualquier máquina — elige modelos Whisper de tiny (hardware antiguo, 4 GB RAM) a large-v3 (calidad estudio en GPUs modernas). Sin LLM, sin suscripción, sin límite de palabras.
    improve:
      card_title: ✏️ Mejorar — reescribe lo que seleccionas
      badge: Alt+I
      description: Estás redactando un doc y un párrafo no acaba de arrancar — la idea está pero el texto no fluye. Seleccionalo, pulsa Alt+I y di "hazlo más directo y córtalo a la mitad". PerkySue lee tu selección y tu instrucción a la vez. El párrafo reescrito reemplaza el original, ahí mismo, sin salir de la app.
      prompt: 🎤  "hazlo más dinámico, la versión actual es muy sosa"
      result: ✅  Tu selección se reemplaza por la versión mejorada.
    professional:
      card_title: 💼 Profesional — corrige el tono y los errores de una vez
      badge: Alt+P
      description: Has escrito dos párrafos mezclando un tono informal con alguna falta. Seleccionalos, pulsa Alt+P y di "límpialo, lo necesito para una presentación al consejo". El LLM lo reescribe con formalidad y corrige los errores — tu selección se reemplaza, sin tocar el portapapeles.
      prompt: 🎤  "que suene cuidado, corrige también la gramática"
      result: ✅  Tu selección se reemplaza por una versión formal y corregida.
  use_cases:
    section_title: Más modos de voz en acción
    intro: Cada modo funciona como una orden de voz — no hace falta seleccionar texto. Pulsa el atajo, habla, y el resultado aparece en tu cursor.
    footer: Todos los modos corren 100 % en tu máquina. Sin API, sin internet, sin datos que salgan.
    items:
    - badge: Alt+M
      name: Email — dilo, envíalo
      prompt: 🎤  "escribe un email a John para avisarle de que PerkySue está lista para lanzar — menciona que apuntamos a un lanzamiento suave la semana que viene"
      result: ✅  Un email profesional y bien formateado aparece en tu cursor. PerkySue escribe en el idioma que hablas.
    - badge: Alt+D
      name: Mensaje directo — amigable, listo para pegar
      prompt: 🎤  "dile al abuelo que no olvide la salsa de soja"
      result: ✅  ¡Abuelo! Un recordatorio rápido — ¡no olvides la salsa de soja! ¡Que tengas un buen día!
    - badge: Alt+X
      name: Post en redes — para publicar o responder
      prompt: 🎤  "responde a este comentario de YouTube — dile gracias y que el próximo vídeo sale la semana que viene sobre el sistema de plugins"
      result: ✅  ¡Muchas gracias! Me alegra que te haya gustado. El próximo vídeo sale la semana que viene — nos metemos con el sistema de plugins. ¡Nos vemos!
    - badge: Alt+C
      name: Consola — descríbelo, obtén el comando
      prompt: 🎤  "encuentra todos los archivos Python modificados en los últimos 7 días"
      result: ✅  find . -name "*.py" -mtime -7 — listo para pegar en tu terminal.
    - badge: Alt+A
      name: Ask — Q&A con memoria de conversación
      prompt: 🎤  "¿cuál es la diferencia entre un mutex y un semáforo?"
      result: ✅  La respuesta se inyecta en tu cursor. Pregunta lo que quieras — el modelo recuerda la conversación.
    - badge: Alt+V/B/N
      name: Prompts personalizados — tus reglas, tus flujos
      prompt: 🎤  Tres slots de prompts editables en Prompts.
      result: ✅  Convierte tu voz en notas de reunión, un estilo de escritura, salida estructurada — lo que necesites.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — lanza y olvídate
    description: PerkySue guarda la posición de tu cursor en el momento en que pulsas el atajo. Mientras Whisper transcribe y el LLM genera, puedes cambiar de app, seguir escribiendo en otra ventana, hacer lo tuyo. El resultado cae donde lo lanzaste — no donde está tu cursor ahora.
  voice_modes:
    section_title: Modos de voz
    modes:
    - hotkey: Alt+T
      name: Transcribir
      description: Transcripción rápida (sin LLM)
      needs_llm: false
    - hotkey: Alt+I
      name: Mejorar
      description: Limpiar y formatear texto
      needs_llm: true
    - hotkey: Alt+P
      name: Profesional
      description: Reescritura formal y profesional
      needs_llm: true
    - hotkey: Alt+L
      name: Traducir
      description: Traducir al idioma destino
      needs_llm: true
    - hotkey: Alt+C
      name: Consola
      description: Extraer un comando shell
      needs_llm: true
    - hotkey: Alt+M
      name: Email
      description: Formatear como email profesional
      needs_llm: true
    - hotkey: Alt+D
      name: Mensaje directo
      description: WhatsApp/Slack/Discord/SMS — tono según el contexto
      needs_llm: true
    - hotkey: Alt+X
      name: Post social
      description: LinkedIn/X/YouTube/Reddit — publicar o responder
      needs_llm: true
    - hotkey: Alt+S
      name: Resumir
      description: Condensar en puntos clave
      needs_llm: true
    - hotkey: Alt+A
      name: Ask
      description: Pregunta algo — el LLM responde en tu cursor
      needs_llm: true
    - hotkey: Alt+H
      name: Ayuda
      description: Preguntas sobre PerkySue — KB de la app + tu config
      needs_llm: true
    - hotkey: Alt+G
      name: GenZ
      description: Reescritura informal, estilo actual
      needs_llm: true
  competition:
    section_title: PerkySue vs. la competencia
    items:
    - title: vs. dictado integrado
      examples: Windows, macOS, Google
      description: Solo transcriben palabras. PerkySue transcribe y piensa — 11 modos convierten tu voz en emails, comandos, traducciones, resúmenes.
    - title: vs. dictado en la nube
      examples: Wispr Flow, Typeless
      description: Tu audio nunca sale de tu máquina. Sin cuenta, sin internet, sin límite de palabras. Funciona en modo avión y desde un USB.
    - title: vs. herramientas open source
      examples: Amical, OpenWhispr
      description: Hacen STT + pegar. PerkySue suma un pipeline LLM local, selección de texto + instrucciones de voz, Smart Focus y un widget GUI.
  privacy:
    section_title: Privacidad
    items:
    - icon: 🔒
      title: Sin internet
      description: Todo corre en tu máquina
    - icon: 🔇
      title: Audio nunca guardado
      description: Se captura en RAM, se transcribe y se borra de inmediato
    - icon: 👤
      title: Sin cuenta
      description: Sin registro, sin rastreo, sin cookies
    - icon: 📂
      title: Open source
      description: Inspecciona cada línea de código tú mismo
  why_i_built_it:
    section_title: Por qué lo construí
    paragraph_1: 'PerkySue empezó como una herramienta de productividad personal — algo que yo mismo necesitaba cada día, no un pitch deck. Después de años diseñando arquitecturas de software y plataformas conversacionales, quería un solo pipeline: voz → STT local → LLM local → texto inyectado donde ya trabajo.'
    paragraph_2: 'El código se co-desarrolló con IA: este proyecto implicó una colaboración sostenida con asistentes de programación IA. El pipeline local es complejo. Y lo gracioso es que hoy PerkySue me ayuda a codificar su propio código, sin enviar mi voz ni mis datos a la nube.'
  links:
