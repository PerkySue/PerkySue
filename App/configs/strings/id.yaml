      description: Terjemahkan ke bahasa target
      needs_llm: true
    - hotkey: Alt+C
      name: Console
      description: Ekstrak perintah shell
      needs_llm: true
    - hotkey: Alt+M
      name: Email
      description: Format sebagai email profesional
      needs_llm: true
    - hotkey: Alt+D
      name: Pesan Langsung
      description: WhatsApp/Slack/Discord/SMS — gaya sesuai hubungan
      needs_llm: true
    - hotkey: Alt+X
      name: Post Sosial
      description: LinkedIn/X/YouTube/Reddit — posting atau balas
      needs_llm: true
    - hotkey: Alt+S
      name: Ringkas
      description: Padatkan jadi poin-poin utama
      needs_llm: true
    - hotkey: Alt+A
      name: Ask
      description: Tanya sesuatu — LLM jawab di kursormu
      needs_llm: true
    - hotkey: Alt+H
      name: Bantuan
      description: Tanya soal PerkySue — KB app + pengaturanmu
      needs_llm: true
    - hotkey: Alt+G
      name: GenZ
      description: Tulis ulang gaya santai kekinian
      needs_llm: true
  competition:
    section_title: PerkySue vs. Pesaing
    items:
    - title: vs. dikte bawaan
      examples: Windows, macOS, Google
      description: Mereka cuma transkripsi. PerkySue transkripsi sekaligus mikir — 11 mode ubah suaramu jadi email, perintah, terjemahan, ringkasan.
    - title: vs. dikte cloud
      examples: Wispr Flow, Typeless
      description: Audiomu nggak kemana-mana. Tanpa akun, tanpa internet, tanpa batas kata. Jalan di mode pesawat atau dari USB.
    - title: vs. tools open source
      examples: Amical, OpenWhispr
      description: Mereka cuma STT + paste. PerkySue tambah pipeline LLM lokal, seleksi teks + instruksi suara, Smart Focus, dan widget GUI.
  privacy:
    section_title: Privasi
    items:
    - icon: 🔒
      title: Tanpa internet
      description: Semua jalan di komputermu
    - icon: 🔇
      title: Audio nggak disimpan
      description: Direkam di RAM, ditranskripsi, langsung dihapus
    - icon: 👤
      title: Tanpa akun
      description: Tanpa daftar, tanpa tracking, tanpa cookies
    - icon: 📂
      title: Open source
      description: Cek sendiri setiap baris kodenya
  why_i_built_it:
    section_title: Kenapa saya bikin PerkySue?
    paragraph_1: 'PerkySue mulai sebagai alat produktivitas pribadi — sesuatu yang saya butuhkan tiap hari, bukan buat pitch deck. Setelah bertahun-tahun desain arsitektur software dan platform percakapan, saya mau satukan semuanya: suara → STT lokal → LLM lokal → teks diinjeksi di tempat saya kerja.'
    paragraph_2: 'Kodenya dikembangkan bareng AI: proyek ini melibatkan kolaborasi intensif dengan asisten coding AI. Pipeline lokalnya kompleks. Lucunya, PerkySue sekarang bantu saya coding kodenya sendiri, tanpa kirim suara atau data saya ke cloud.'
