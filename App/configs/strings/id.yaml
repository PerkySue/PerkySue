  hero:
    title: PerkySue
    tagline: Dikte suara + AI. 100% lokal. 100% privat.
    subtitle: Tekan pintasan, ngomong, teks langsung muncul di kursormu — di app mana pun, jendela mana pun, kolom mana pun. Tanpa cloud. Tanpa akun. Datamu nggak kemana-mana.
  why_exists:
    section_title: Kenapa PerkySue ada
    line_1: Semua alat dikte lain cuma setengah-setengah.
    line_2: Mereka ubah suaramu jadi teks — tapi nggak ikut mikir bareng kamu.
    line_3: Kamu masih harus copy teks ke chatbot, tunggu, terus copy balik jawabannya. Banyak langkah untuk sesuatu yang harusnya satu — dan kata-katamu baru aja pergi ke server yang bukan milikmu.
    line_4: PerkySue itu semua pipeline dalam satu pintasan.
    line_5: Pengenalan suara, transformasi LLM lokal, injeksi teks — satu aksi, di app mana pun, tanpa kirim apa pun keluar.
    line_6: Suara bukan data biasa — itu data biometrik.
    line_7: Ada aksenmu, ritme bicaramu, kondisi emosimu. Alat dikte cloud merekamnya, mentransmisikannya, dan menyimpannya dengan syarat yang jarang dibaca orang. Dipakai untuk melatih model dan dibagi ke mitra infrastruktur.
    line_8: PerkySue rekam audio di RAM, proses secara lokal, langsung buang. Nggak ada yang disimpan, dicatat, atau dikirim.
    line_9: Suaramu tetap milikmu!
  how_it_works:
    section_title: Cara kerjanya
    step1_title: Tekan pintasan
    step1_description: 'Taruh kursormu di app mana pun yang biasa kamu ketik (Word, Gmail, Slack, VS Code…) terus tekan:'
    step2_title: Ngomong aja
    step2_description: PerkySue rekam sampai kamu berhenti bicara. Kebisingan bisa cegah auto-stop — tekan Alt+Q (global default) atau Esc saat app aktif, atau klik foto profil.
    step3_title: Teks muncul di tempat kamu mulai
    step3_description: PerkySue kunci posisi kursormu dan jendela aktif saat kamu tekan pintasan.
    step4_title: Kerja terus saat diproses
    step4_description: Ganti tab, ketik di tempat lain. Smart Focus injeksi hasilnya di tempat kamu mulai.
  features:
    section_title: Buat apa aja sih
    transcribe:
      card_title: 🎙️ Transkripsi — gratis, selamanya
      badge: Alt+T
      description: Ngomong, transkrip langsung muncul di kursormu. Jalan di mesin apa pun — pilih model Whisper dari tiny (hardware lama, 4 GB RAM) sampai large-v3 (kualitas studio di GPU modern). Tanpa LLM, tanpa langganan, tanpa batas kata.
    improve:
      card_title: ✏️ Perbaiki — tulis ulang yang kamu pilih
      badge: Alt+I
      description: Lagi nulis dokumen dan satu paragraf terasa hambar — idenya ada tapi tulisannya nggak nyambung. Pilih teksnya, tekan Alt+I, bilang "bikin ini lebih tajam dan potong setengahnya". PerkySue baca pilihanmu dan instruksimu sekaligus. Paragraf baru langsung ganti yang lama, di tempat yang sama, tanpa keluar app.
      prompt: 🎤  "bikin ini lebih menarik, versi sekarang terlalu kering"
      result: ✅  Pilihanmu diganti dengan versi yang sudah diperbaiki.
    professional:
      card_title: 💼 Profesional — perbaiki gaya dan kesalahan sekaligus
      badge: Alt+P
      description: Kamu nulis dua paragraf yang campur gaya santai sama beberapa typo. Pilih semuanya, tekan Alt+P, bilang "beresin ini, buat presentasi ke bos". LLM tulis ulang dengan formal dan benerin kesalahan — pilihanmu langsung terganti, tanpa ribet clipboard.
      prompt: 🎤  "harus kedengarannya rapi, benerin juga gramatikanya"
      result: ✅  Pilihanmu diganti dengan versi formal yang sudah dikoreksi.
  use_cases:
    section_title: Mode suara lainnya
    intro: Setiap mode bekerja seperti perintah suara — nggak perlu pilih teks dulu. Tekan pintasan, ngomong, hasilnya langsung muncul di kursormu.
    footer: Semua mode jalan sepenuhnya di komputermu. Tanpa panggilan API, tanpa internet, tanpa data yang keluar.
    items:
    - badge: Alt+M
      name: Email — bilang aja, langsung jadi
      prompt: 🎤  "tulis email ke John bilang PerkySue siap diluncurkan — sebut juga kita targetkan rilis pekan depan"
      result: ✅  Email profesional yang rapi langsung muncul di kursormu. PerkySue nulis dalam bahasa yang kamu pakai.
    - badge: Alt+D
      name: Pesan Langsung — santai, siap kirim
      prompt: 🎤  "bilang ke kakek jangan lupa kecap asin"
      result: ✅  Kek! Ingetin ya — jangan lupa kecap asinnya! Semoga hari kakek menyenangkan!
    - badge: Alt+X
      name: Post Sosial — posting atau balas di mana aja
      prompt: 🎤  "balas komentar YouTube ini — bilang makasih dan video berikutnya keluar minggu depan tentang sistem plugin"
      result: ✅  Makasih banyak! Seneng banget kamu suka. Video berikutnya minggu depan — bahas sistem plugin. Stay tuned!
    - badge: Alt+C
      name: Console — deskripsikan, dapatkan perintahnya
      prompt: 🎤  "cari semua file Python yang diubah dalam 7 hari terakhir"
      result: ✅  find . -name "*.py" -mtime -7 — siap di-paste ke terminalmu.
    - badge: Alt+A
      name: Ask — tanya jawab dengan memori percakapan
      prompt: 🎤  "apa bedanya mutex sama semaphore?"
      result: ✅  Jawaban langsung muncul di kursormu. Tanya lanjutan — model ingat riwayat obrolanmu.
    - badge: Alt+V/B/N
      name: Prompts Kustom — aturanmu, workflowmu
      prompt: 🎤  Tiga slot prompt yang bisa kamu edit di Prompt Modes.
      result: ✅  Ubah suaramu jadi catatan rapat, gaya tulisan tertentu, output terstruktur — sesuka kamu.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — tekan, lanjut kerja
    description: PerkySue kunci posisi kursormu saat kamu tekan pintasan. Selagi Whisper transkripsi dan LLM generate, kamu bebas ganti app, lanjut ngetik, apa pun. Hasilnya mendarat di tempat kamu mulai — bukan di mana kursormu sekarang.
  voice_modes:
    section_title: Mode Suara
    modes:
    - hotkey: Alt+T
      name: Transkripsi
      description: Transkripsi cepat (tanpa LLM)
      needs_llm: false
    - hotkey: Alt+I
