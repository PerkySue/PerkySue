header_tips:
  startup_message: Tips · Taruh kursor di Word, Gmail, Slack… terus tekan Alt+T
  tips:
  - Tips · Tekan Alt+Q atau klik avatar untuk hentikan rekaman
  - Tips · Alt+T gratis selamanya — transkripsi cepat, tanpa LLM
  - Tips · Pilih teks apa pun, tekan Alt+I, bilang mau diubah apa
  - Tips · Tekan Alt+M di mana pun untuk dikte email lengkap
  - 'Alt+A Pro: lanjut obrolan di chat — Alt+A Gratis: satu pertanyaan per kali'
  - Tips · Kebisingan cegah auto-stop? Tekan Alt+Q untuk hentikan
  - Tips · Pilih paragraf → Alt+P — gaya dan tata bahasa beres sekaligus
  - 'Tips · Alt+C di terminal: deskripsikan kebutuhanmu pakai bahasa biasa'
  - 'Tips · Alt+L: pilih teks dan minta terjemahkan ke bahasa apa pun'
  - 'Tips · Alt+D: dikte pesan langsung untuk WhatsApp, Slack, Discord, SMS'
  - 'Tips · Alt+X: buat posting atau balasan untuk LinkedIn, X, YouTube, Reddit'
  - Tips · Paste catatan rapat, pilih semua, Alt+S untuk ringkasan singkat
  - Tips · Pilih teks berantakan, tekan Alt+I, bilang 'persingkat ini' — beres
  - Tips · Alt+V sampai Alt+N = prompt kustommu. Edit di Prompt Modes
  - Tips · Buat prompt kustom untuk balas komentar dengan tone brandmu
  - Tips · Bosan tulis ulang prompt AI yang sama? Buat generator prompt kustom
  - 'Tips · Ide prompt kustom: ubah catatan jadi post LinkedIn yang engaging'
  - Tips · Pakai prompt kustom untuk generate prompt video Kling/Runway terformat
  - 'Tips · Ide prompt kustom: ekstrak action item dan deadline dari teks'
  - 'Tips · Alt+H: tanya apa pun soal PerkySue di tab Bantuan'
  - Pro · Smart Focus nggak paste? Salin output dari tab Console
  - 'Tips · Hentikan tahap Mendengarkan: klik avatar atau tekan Alt+Q'
  - Tips · Ganti app saat PerkySue proses — hasilnya tetap di tempat kamu mulai
  - 'Tips · Smart Focus: tekan, kerja terus, teks muncul di tempat kamu mulai'
  - Tips · CPU? Pakai Whisper small (cepat) atau medium (akurat). ⚙️ → Model STT
  - Tips · Bising? Rekaman nggak auto-stop — Alt+Q atau klik avatar
  - Tips · Edit prompt tiap mode di Prompt Modes — jadikan PerkySue milikmu
  - Tips · Whisper salah tangkap kata? Tambahkan ke Kata Kunci STT di Prompt Modes
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
