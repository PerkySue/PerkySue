    custom_prompts: '커스텀 프롬프트: Alt+V/B/N = 3개 슬롯 — 내 규칙과 톤으로 워크플로 재사용.'
    footer: 로컬 실행 — 텍스트는 내 PC에 남습니다.
  hero:
    title: PerkySue
    tagline: AI 탑재 음성-텍스트 변환. 100% 로컬. 100% 프라이빗.
    subtitle: 단축키 누르고, 말하면, 커서 위치에 바로 텍스트가 뜬다 — 어떤 앱이든, 어떤 창이든, 어떤 입력란이든. 클라우드 없음. 계정 없음. 데이터가 내 PC를 절대 떠나지 않음.
  why_exists:
    section_title: PerkySue가 존재하는 이유
    line_1: 다른 받아쓰기 툴들은 전부 문제의 절반만 해결한다.
    line_2: 목소리를 단어로 바꿔주긴 하는데 — 같이 생각해주지는 않는다.
    line_3: 텍스트를 챗봇에 복붙하고, 기다리고, 답변을 다시 복붙한다. 한 번에 끝날 일이 여러 단계가 되고 — 내 말은 내가 통제 못하는 서버로 날아간다.
    line_4: PerkySue는 단축키 하나로 전체 파이프라인을 처리한다.
    line_5: 음성 인식, 로컬 LLM 변환, 텍스트 삽입 — 한 번에, 어떤 앱에서든, 아무것도 내 기기를 떠나지 않고.
    line_6: 목소리는 중립 데이터가 아니다 — 생체 정보다.
    line_7: 억양, 말 리듬, 감정 상태가 담겨 있다. 클라우드 받아쓰기 툴들은 그걸 캡처하고, 전송하고, 대부분 읽지도 않는 약관 하에 보관한다. 모델 학습에 쓰이고 인프라 파트너와 공유된다.
    line_8: PerkySue는 오디오를 RAM에서 처리하고 로컬에서 변환한 뒤 즉시 삭제한다. 저장도, 로그도, 전송도 없다.
    line_9: 내 목소리는 나에게 남는다.
  how_it_works:
    section_title: 어떻게 작동하나
    step1_title: 단축키 누르기
    step1_description: '보통 타이핑하는 앱에 커서를 놓고 (Word, Gmail, Slack, VS Code…) 누르면 된다:'
    step2_title: 자연스럽게 말하기
    step2_description: 말을 멈출 때까지 PerkySue가 듣는다. 주변 소음 때문에 자동 정지가 안 되면 — Alt+Q (전역 기본값) 또는 앱이 포커스일 때 Esc를 누르거나, 프로필 사진을 클릭하면 된다.
    step3_title: 텍스트가 시작한 곳에 나타남
    step3_description: 단축키를 누르는 순간 PerkySue가 커서와 활성 창을 잠근다.
    step4_title: 처리되는 동안 계속 작업하기
    step4_description: 탭 바꾸고, 다른 데 타이핑해도 된다. Smart Focus가 시작한 위치에 결과를 삽입한다.
  features:
    section_title: 사람들이 어디에 쓰나
    transcribe:
      card_title: 🎙️ 받아쓰기 — 무료, 영원히
      badge: Alt+T
      description: 말하면 커서 위치에 원문 텍스트가 바로 뜬다. 모든 PC에서 작동 — Whisper 모델을 tiny (구형 하드웨어, 4GB RAM)부터 large-v3 (최신 GPU 스튜디오급)까지 선택 가능. LLM 필요 없음, 구독 없음, 단어 제한 없음.
    improve:
      card_title: ✏️ 개선 — 선택한 텍스트 다시 쓰기
      badge: Alt+I
      description: 문서 작업 중 한 단락이 안 사는 경우 — 아이디어는 있는데 글이 밋밋하다. 선택하고, Alt+I 누르고, "더 임팩트 있게, 절반으로 줄여줘"라고 말하면 된다. PerkySue가 선택 텍스트와 지시를 동시에 읽는다. 다시 쓴 단락이 원본을 대체하고, 앱을 벗어나지 않는다.
      prompt: 🎤  "더 흥미롭게 만들어줘, 지금 버전은 너무 딱딱해"
      result: ✅  선택한 텍스트가 개선된 버전으로 교체된다.
    professional:
      card_title: 💼 전문적 — 어조와 오류를 한 번에 수정
      badge: Alt+P
      description: 캐주얼한 말투와 오타가 섞인 두 단락을 썼다. 선택하고, Alt+P 누르고, "정리해줘, 이사회 보고용이야"라고 말하면 된다. LLM이 격식체로 다시 쓰고 오류를 수정한다 — 클립보드 없이 선택 텍스트가 바로 교체된다.
      prompt: 🎤  "세련되게 들려야 해, 문법도 고쳐줘"
      result: ✅  선택한 텍스트가 격식 있게 수정된 버전으로 교체된다.
  use_cases:
    section_title: 더 많은 음성 모드 실제 활용
    intro: 각 모드는 음성 명령으로 작동한다 — 텍스트 선택 불필요. 단축키 누르고, 말하고, 커서 위치에 결과가 나타난다.
    footer: 모든 모드는 내 PC에서만 실행된다. API 호출 없음, 인터넷 없음, 데이터가 기기를 떠나지 않음.
    items:
    - badge: Alt+M
      name: 이메일 — 말하고 보내기
      prompt: 🎤  "John에게 PerkySue가 런치 준비됐다고 이메일 써줘 — 다음 주 소프트 출시 목표라고 언급해줘"
      result: ✅  커서 위치에 제대로 포맷된 전문 이메일이 나타난다. PerkySue는 말하는 언어로 작성한다.
    - badge: Alt+D
      name: 다이렉트 메시지 — 바로 보낼 수 있게
      prompt: 🎤  "할머니한테 간장 잊지 말라고 해줘"
      result: ✅  할머니! 간장 잊지 마세요! 좋은 하루 되세요!
    - badge: Alt+X
      name: 소셜 포스트 — 게시 또는 답글
      prompt: 🎤  "이 YouTube 댓글에 답글 달아줘 — 감사하다고 하고 다음 주에 플러그인 시스템 영상 올라온다고 해줘"
      result: ✅  정말 감사해요! 좋게 봐주셔서 기쁩니다. 다음 주에 플러그인 시스템 영상 올라와요. 기대해주세요!
    - badge: Alt+C
      name: 콘솔 — 설명하면 명령어가 나옴
      prompt: 🎤  "최근 7일 동안 수정된 Python 파일 전부 찾아줘"
      result: ✅  find . -name "*.py" -mtime -7 — 터미널에 바로 붙여넣을 수 있다.
    - badge: Alt+A
      name: Ask — 대화 메모리 포함 Q&A
      prompt: 🎤  "mutex와 semaphore의 차이가 뭐야?"
      result: ✅  커서 위치에 답변이 삽입된다. 추가 질문을 해도 모델이 대화 내용을 기억한다.
    - badge: Alt+V/B/N
      name: 커스텀 프롬프트 — 내 규칙, 내 워크플로
      prompt: 🎤  Prompts에서 편집할 수 있는 사용자 정의 프롬프트 슬롯 3개.
      result: ✅  음성을 회의 노트, 특정 글쓰기 스타일, 구조화된 출력으로 변환 — 필요한 것 무엇이든.
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — 누르고 잊어버려도 된다
    description: 단축키를 누르는 순간 PerkySue가 커서 위치를 기억한다. Whisper가 받아쓰고 LLM이 생성하는 동안 앱을 바꾸고, 다른 곳에 타이핑하고, 뭐든 해도 된다. 결과는 시작한 위치에 도착한다 — 지금 커서가 있는 곳이 아니라.
  voice_modes:
    section_title: 음성 모드
    modes:
    - hotkey: Alt+T
      name: 받아쓰기
      description: 빠른 받아쓰기 (LLM 없음)
      needs_llm: false
    - hotkey: Alt+I
      name: 개선
      description: 텍스트 정리 및 포맷
      needs_llm: true
    - hotkey: Alt+P
      name: 전문적
      description: 격식체 비즈니스 리라이트
      needs_llm: true
    - hotkey: Alt+L
      name: 번역
      description: 목표 언어로 번역
      needs_llm: true
    - hotkey: Alt+C
      name: 콘솔
      description: 셸 명령어 추출
      needs_llm: true
    - hotkey: Alt+M
      name: 이메일
      description: 전문 이메일 형식으로 포맷
      needs_llm: true
    - hotkey: Alt+D
      name: 다이렉트 메시지
      description: WhatsApp/Slack/Discord/SMS — 관계에 맞는 어조
      needs_llm: true
    - hotkey: Alt+X
      name: 소셜 포스트
      description: LinkedIn/X/YouTube/Reddit — 게시 또는 답글
      needs_llm: true
    - hotkey: Alt+S
      name: 요약
      description: 핵심 포인트로 압축
      needs_llm: true
    - hotkey: Alt+A
      name: Ask
      description: 질문하면 LLM이 커서 위치에 답함
      needs_llm: true
    - hotkey: Alt+H
      name: 도움말
      description: PerkySue 질문 — 앱 KB + 내 설정
      needs_llm: true
    - hotkey: Alt+G
      name: GenZ
      description: 캐주얼하고 트렌디한 리라이트
      needs_llm: true
  competition:
    section_title: PerkySue vs. 경쟁 제품
    items:
    - title: vs. 내장 받아쓰기
      examples: Windows, macOS, Google
      description: 그것들은 단어만 받아쓴다. PerkySue는 받아쓰고 생각한다 — 11가지 모드가 음성을 이메일, 명령어, 번역, 요약으로 변환한다.
    - title: vs. 클라우드 받아쓰기
      examples: Wispr Flow, Typeless
      description: 오디오가 내 PC를 절대 떠나지 않는다. 계정 없음, 인터넷 없음, 단어 제한 없음. 비행기 모드나 USB에서도 작동한다.
    - title: vs. 오픈소스 툴
      examples: Amical, OpenWhispr
      description: 그것들은 STT + 붙여넣기만 한다. PerkySue는 로컬 LLM 파이프라인, 텍스트 선택 + 음성 지시, Smart Focus, GUI 위젯을 추가한다.
  privacy:
    section_title: 개인정보 보호
    items:
    - icon: 🔒
      title: 인터넷 불필요
      description: 모든 것이 내 PC에서 실행됨
    - icon: 🔇
      title: 오디오 저장 안 됨
      description: RAM에서 캡처, 변환 후 즉시 삭제
    - icon: 👤
      title: 계정 불필요
      description: 회원가입 없음, 추적 없음, 쿠키 없음
    - icon: 📂
      title: 오픈 소스
      description: 코드 한 줄 한 줄 직접 확인 가능
  why_i_built_it:
    section_title: 왜 만들었나
    paragraph_1: 'PerkySue는 개인 생산성 툴로 시작했다 — 피치덱용이 아니라 내가 매일 필요한 것. 수년간 소프트웨어 아키텍처와 대화형 플랫폼을 설계한 후, 하나의 파이프라인을 원했다: 음성 → 로컬 STT → 로컬 LLM → 이미 작업 중인 곳에 텍스트 삽입.'
    paragraph_2: '코드는 AI와 공동 개발됐다: 이 프로젝트는 AI 프로그래밍 어시스턴트와의 지속적인 협업으로 만들어졌다. 로컬 파이프라인은 복잡하다. 재미있게도, PerkySue가 오늘 내 목소리나 데이터를 클라우드에 보내지 않고 자기 코드를 짜는 걸 도와주고 있다.'
  links:
    section_title: 링크
    items:
    - label: GitHub 저장소
      url: https://github.com/PerkySue/PerkySue
    - label: Discord 커뮤니티
      url: https://discord.gg/UaJHEzFgXy
    - label: Patreon에서 후원하기 ❤
      url: https://patreon.com/PerkySue
    - label: 개인정보 처리방침
      url: ''
    - label: 아키텍처 문서
      url: ''
    credit: '제작: Jérôme Corbiau  ·  Apache 2.0 라이선스'
