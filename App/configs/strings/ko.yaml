header_tips:
  startup_message: 팁 · Word, Gmail, Slack… 에 커서 놓고 Alt+T 누르면 된다
  tips:
  - 팁 · Alt+Q 누르거나 사이드바 아바타 클릭해서 녹음 중지
  - 팁 · Alt+T는 영원히 무료 — 빠른 받아쓰기, 단어 제한 없음
  - 팁 · 텍스트 선택, Alt+I, 바꾸고 싶은 거 말하면 된다
  - 팁 · 어디서든 Alt+M 눌러서 이메일 전체를 받아쓸 수 있다
  - 'Alt+A Pro: 채팅에서 대화 이어감 — Alt+A 무료: 한 번에 한 질문'
  - 팁 · 주변 소음 때문에 자동 정지 안 됨? Alt+Q 눌러서 중지
  - 팁 · 단락 선택 → Alt+P — 어조와 문법을 한 번에 수정
  - '팁 · 터미널에서 Alt+C: 필요한 게 뭔지 쉬운 말로 설명하면 됨'
  - '팁 · Alt+L: 텍스트 선택 후 어떤 언어로든 번역 요청 가능'
  - '팁 · Alt+D: WhatsApp, Slack, Discord, SMS용 메시지 받아쓰기'
  - '팁 · Alt+X: LinkedIn, X, YouTube, Reddit용 게시물 또는 답글 만들기'
  - 팁 · 회의 노트 붙여넣고 선택한 뒤 Alt+S로 간단 요약
  - 팁 · 초안 텍스트 선택, Alt+I, '더 짧게' 말하면 — 끝
  - 팁 · Alt+V~Alt+N = 내 커스텀 프롬프트. Prompts에서 편집
  - 팁 · 내 브랜드 어조로 댓글에 답하는 커스텀 프롬프트 만들어보기
  - 팁 · 같은 AI 프롬프트 계속 다시 쓰기 귀찮아? 커스텀 프롬프트로 만들면 된다
  - '팁 · 프롬프트 아이디어: 노트를 훅 있는 LinkedIn 포스트로 변환'
  - 팁 · 포맷된 Kling/Runway 비디오 프롬프트용 커스텀 프롬프트 활용
  - '팁 · 프롬프트 아이디어: 텍스트에서 할 일과 마감 기한 추출'
  - '팁 · Alt+H: 도움말 탭에서 PerkySue에 관한 뭐든지 물어봐'
  - Pro · Smart Focus가 붙여넣기 안 됐어? 콘솔 탭에서 출력 복사하기
  - '팁 · 듣기 단계 중지: 아바타 클릭 또는 Alt+Q 누르기'
  - 팁 · PerkySue가 생각하는 동안 다른 작업 해도 됨 — 기다릴 필요 없다
  - '팁 · Smart Focus: 누르고, 다른 거 하면 됨, 텍스트가 맞는 위치에 도착함'
  - 팁 · CPU? Whisper small (빠름) 또는 medium (정확). ⚙️ → STT 모델
  - 팁 · 주변 소음? 녹음이 자동 중지 안 됨 — Alt+Q 또는 아바타 클릭
  - 팁 · Prompts에서 각 모드의 프롬프트 편집 — 내 것으로 만들기
  - 팁 · Whisper가 단어 틀렸어? Prompts의 STT 키워드에 추가하면 됨
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
