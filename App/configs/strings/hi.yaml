header_tips:
  startup_message: Tip · Word, Gmail, Slack… में cursor रखो फिर Alt+T दबाओ
  tips:
  - Tip · Recording manually रोकने के लिए Alt+Q दबाओ या sidebar avatar click करो
  - Tip · Alt+T हमेशा free है — fast transcription, कोई LLM नहीं चाहिए
  - Tip · कोई भी text select करो, Alt+I दबाओ, और बताओ क्या बदलना है
  - Tip · कहीं भी Alt+M दबाओ और पूरा email dictate करो
  - 'Alt+A Pro: चैट में सिलसिला — Alt+A फ्री: एक बार में एक सवाल'
  - Tip · Ambient noise से auto-stop नहीं हो रहा? Alt+Q दबाओ
  - Tip · Paragraph select करो → Alt+P — tone और grammar एक साथ fix
  - 'Tip · Alt+C: terminal में plain words में बताओ क्या चाहिए'
  - 'Tip · Alt+L: कोई text select करो और किसी भी language में translate करवाओ'
  - 'Tip · Alt+D: WhatsApp, Slack, Discord, SMS के लिए message dictate करो'
  - 'Tip · Alt+X: LinkedIn, X, YouTube के लिए post या reply बनाओ'
  - Tip · Meeting notes paste करो, select करो, Alt+S से short summary बनाओ
  - Tip · Rough text select करो, Alt+I दबाओ, 'छोटा करो' बोलो — done
  - Tip · Alt+V से Alt+N = तुम्हारे custom prompts। Prompt Modes में edit करो
  - Tip · Brand के tone में comments का reply करने के लिए custom prompt बनाओ
  - Tip · बार-बार same AI prompts लिखते हो? Custom prompt बना लो
  - 'Tip · Custom prompt idea: Notes को LinkedIn post में बदलो'
  - Tip · Custom prompts से Kling/Runway video prompts format करो
  - 'Tip · Custom prompt idea: Text से action items और deadlines निकालो'
  - 'Tip · Alt+H: Help Tab पर PerkySue से कुछ भी पूछो'
  - Pro · Smart Focus ने paste नहीं किया? Console tab से output copy करो
  - Tip · Recording रोकने के लिए avatar click करो या Alt+Q दबाओ
  - Tip · PerkySue सोच रहा हो तो दूसरा काम करो — इंतज़ार मत करो
  - 'Smart Focus: trigger करो, आगे बढ़ो — result वहीं पहुँचेगा जहाँ से शुरू किया'
  - Tip · CPU only? Whisper small (fast) या medium (accurate) try करो। ⚙️ → STT Model
  - Tip · Ambient noise से recording नहीं रुक रही? Alt+Q या avatar click करो
  - Tip · Prompt Modes में हर mode का prompt edit करो — PerkySue को अपना बनाओ
  - Tip · Whisper कोई word गलत लिखता है? Prompt Modes के STT Keywords में add करो
  delay_before_first_ms: 3500
  display_ms: 7500
  delay_between_ms: 15000
