  hero:
    title: PerkySue
    tagline: AI के साथ voice-to-text। 100% लोकल। 100% प्राइवेट।
    subtitle: हॉटकी दबाओ, बोलो, और टेक्स्ट कर्सर की जगह पहुँच जाता है — किसी भी ऐप में, किसी भी विंडो में, किसी भी फ़ील्ड में। कोई क्लाउड नहीं। कोई अकाउंट नहीं। डेटा कभी बाहर नहीं जाता।
  why_exists:
    section_title: PerkySue क्यों बना
    line_1: बाकी सभी dictation टूल्स आधी समस्या ही सुलझाते हैं।
    line_2: वो आवाज़ को शब्दों में बदलते हैं — लेकिन तुम्हारे साथ सोचते नहीं।
    line_3: अभी भी टेक्स्ट chatbot में कॉपी करो, इंतज़ार करो, फिर जवाब वापस पेस्ट करो। एक काम के लिए कई स्टेप्स — और तुम्हारे शब्द एक ऐसे सर्वर पर चले गए जो तुम्हारे कंट्रोल में नहीं।
    line_4: PerkySue पूरा पाइपलाइन एक ही हॉटकी में समेट देता है।
    line_5: Speech recognition, लोकल LLM ट्रांसफ़ॉर्मेशन, और टेक्स्ट इंजेक्शन — एक बार में, किसी भी ऐप में, कुछ भी बाहर भेजे बिना।
    line_6: आवाज़ सिर्फ़ डेटा नहीं है — ये बायोमेट्रिक डेटा है।
    line_7: इसमें तुम्हारा accent, rhythm, emotional state सब है। क्लाउड dictation टूल इसे कैप्चर करते हैं, भेजते हैं, और ऐसी शर्तों पर रखते हैं जो ज़्यादातर लोग कभी पढ़ते नहीं। इसे मॉडल ट्रेनिंग में इस्तेमाल किया जाता है और इंफ्रास्ट्रक्चर पार्टनर्स के साथ शेयर किया जाता है।
    line_8: PerkySue RAM में ऑडियो कैप्चर करता है, लोकल प्रोसेस करता है और तुरंत डिलीट कर देता है। कुछ भी स्टोर, लॉग या ट्रांसमिट नहीं होता।
    line_9: तुम्हारी आवाज़ तुम्हारी ही रहती है!
  how_it_works:
    section_title: कैसे काम करता है
    step1_title: हॉटकी दबाओ
    step1_description: 'जहाँ भी टाइप करते हो (Word, Gmail, Slack, VS Code…) वहाँ कर्सर रखो और दबाओ:'
    step2_title: नैचुरली बोलो
    step2_description: PerkySue तब तक रिकॉर्ड करता है जब तक तुम बोलते हो। आस-पास की आवाज़ से ऑटो-स्टॉप न हो तो Alt+Q (डिफ़ॉल्ट) या Esc दबाओ, या प्रोफ़ाइल पिक्चर क्लिक करो।
    step3_title: टेक्स्ट वहीं पहुँचता है जहाँ ट्रिगर किया
    step3_description: हॉटकी दबाने के पल का कर्सर पोज़िशन और विंडो PerkySue लॉक कर लेता है।
    step4_title: प्रोसेसिंग के दौरान काम जारी रखो
    step4_description: टैब बदलो, कहीं और टाइप करो। Smart Focus रिज़ल्ट वहीं इंजेक्ट करेगा जहाँ से शुरू किया था।
  features:
    section_title: लोग इसे कैसे इस्तेमाल करते हैं
    transcribe:
      card_title: 🎙️ Transcribe — फ्री, हमेशा के लिए
      badge: Alt+T
      description: बोलो, और raw ट्रांसक्रिप्ट कर्सर पर आ जाती है। किसी भी मशीन पर काम करता है — Whisper मॉडल tiny (पुराना PC, 4GB RAM) से large-v3 (नए GPU पर स्टूडियो क्वालिटी) तक चुनो। LLM नहीं चाहिए, सब्सक्रिप्शन नहीं, वर्ड लिमिट नहीं।
    improve:
      card_title: ✏️ Improve — सेलेक्ट किया हुआ फिर से लिखो
      badge: Alt+I
      description: डॉक्युमेंट में एक पैराग्राफ ढंग का नहीं लग रहा — आइडिया सही है पर लिखावट नहीं जम रही। सेलेक्ट करो, Alt+I दबाओ और बोलो 'इसे और पंची बनाओ, आधा काट दो'। PerkySue सेलेक्शन और तुम्हारी instruction एक साथ पढ़ता है। दोबारा लिखा हुआ पैराग्राफ उसी जगह रिप्लेस हो जाता है।
      prompt: 🎤  "इसे ज़्यादा engaging बनाओ, अभी बहुत dry है"
      result: ✅  सेलेक्शन improved version से रिप्लेस हो जाती है।
    professional:
      card_title: 💼 Professional — टोन और errors एक साथ ठीक करो
      badge: Alt+P
      description: दो पैराग्राफ लिखे जिसमें casual और typos दोनों हैं। बोर्ड रिपोर्ट में जाना है। सेलेक्ट करो, Alt+P दबाओ और बोलो 'इसे साफ़ करो, board presentation के लिए चाहिए'। LLM फ़ॉर्मल लिखेगा और errors भी ठीक करेगा — clipboard को हाथ लगाए बिना।
      prompt: 🎤  "इसे polished बनाओ, grammar भी ठीक करो"
      result: ✅  सेलेक्शन formal, corrected version से रिप्लेस हो जाती है।
  use_cases:
    section_title: और भी voice modes देखो
    intro: हर mode एक voice command की तरह काम करता है — टेक्स्ट सेलेक्ट करने की ज़रूरत नहीं। हॉटकी दबाओ, बोलो, रिज़ल्ट कर्सर पर आ जाएगा।
    footer: सभी modes पूरी तरह तुम्हारे PC पर चलते हैं। कोई API call नहीं, कोई internet नहीं, डेटा बाहर नहीं जाता।
    items:
    - badge: Alt+M
      name: Email — बोलो और भेजो
      prompt: 🎤  "John को email लिखो कि PerkySue launch के लिए तैयार है — अगले हफ़्ते soft release का mention करो"
      result: ✅  एक properly formatted professional email कर्सर पर आ जाता है। PerkySue उसी भाषा में लिखता है जिसमें तुम बोलते हो।
    - badge: Alt+D
      name: Direct Message — फ्रेंडली, ready to paste
      prompt: 🎤  "दादाजी को बताओ सोया सॉस मत भूलना"
      result: ✅  दादाजी! बस एक reminder — सोया सॉस मत भूलना! अच्छा दिन रहे!
    - badge: Alt+X
      name: Social Post — किसी भी platform के लिए
      prompt: 🎤  "इस YouTube comment का जवाब दो — thanks बोलो और अगला video अगले हफ़्ते plugin system पर आएगा"
      result: ✅  बहुत शुक्रिया! खुशी हुई कि पसंद आया। अगला video अगले हफ़्ते — plugin system पर deep dive। देखते रहना!
    - badge: Alt+C
      name: Console — describe करो, command मिलेगी
      prompt: 🎤  "पिछले 7 दिनों में बदले सभी Python files ढूंढो"
      result: ✅  find . -name "*.py" -mtime -7 — terminal में paste करने के लिए ready।
    - badge: Alt+A
      name: Ask — conversation memory के साथ Q&A
      prompt: 🎤  "mutex और semaphore में क्या फ़र्क़ है?"
      result: ✅  जवाब कर्सर पर inject होता है। follow-up question पूछो — model conversation history याद रखता है।
    - badge: Alt+V/B/N
      name: Custom Prompts — अपने rules, अपना workflow
      prompt: 🎤  Prompt Modes में edit करने के लिए तीन custom prompt slots।
      result: ✅  speech को meeting notes, writing style, structured output — जो चाहो वो बनाओ।
  smart_focus:
    section_title: Smart Focus
    card_title: 🎯 Smart Focus — दबाओ और भूल जाओ
    description: हॉटकी दबाने के पल का कर्सर पोज़िशन PerkySue याद कर लेता है। Whisper transcribe करे और LLM generate करे — तुम apps switch करो, कहीं और टाइप करो, जो मर्ज़ी करो। रिज़ल्ट वहीं पहुँचता है जहाँ trigger किया था — अभी कर्सर जहाँ है वहाँ नहीं।
  voice_modes:
    section_title: Voice Modes
    modes:
    - hotkey: Alt+T
      name: Transcribe
      description: फ़ास्ट transcription (LLM नहीं चाहिए)
      needs_llm: false
    - hotkey: Alt+I
      name: Improve
      description: टेक्स्ट को clean और format करो
      needs_llm: true
    - hotkey: Alt+P
      name: Professional
      description: Formal business rewrite
      needs_llm: true
    - hotkey: Alt+L
      name: Translate
      description: टार्गेट language में translate करो
      needs_llm: true
    - hotkey: Alt+C
      name: Console
      description: Shell command निकालो
      needs_llm: true
    - hotkey: Alt+M
      name: Email
      description: Professional email format करो
      needs_llm: true
    - hotkey: Alt+D
      name: Direct Message
      description: WhatsApp/Slack/Discord/SMS — रिश्ते के हिसाब से टोन
      needs_llm: true
    - hotkey: Alt+X
      name: Social Post
      description: LinkedIn/X/YouTube/Reddit — post या reply
      needs_llm: true
    - hotkey: Alt+S
      name: Summarize
      description: Key points में condense करो
      needs_llm: true
    - hotkey: Alt+A
      name: Ask
      description: सवाल पूछो — LLM कर्सर पर जवाब देता है
      needs_llm: true
    - hotkey: Alt+H
      name: Help
      description: PerkySue के बारे में पूछो — app KB + settings
      needs_llm: true
    - hotkey: Alt+G
      name: GenZ
      description: Casual, modern rewrite
      needs_llm: true
  competition:
    section_title: PerkySue vs. Competition
    items:
    - title: vs. built-in dictation
      examples: Windows, macOS, Google
      description: वो सिर्फ़ transcribe करते हैं। PerkySue transcribe भी करता है और सोचता भी है — 11 modes speech को emails, commands, translations, summaries में बदलते हैं।
    - title: vs. cloud dictation
      examples: Wispr Flow, Typeless
      description: तुम्हारी आवाज़ कभी machine से बाहर नहीं जाती। कोई account नहीं, internet नहीं, word limit नहीं। Airplane mode पर भी USB stick पर भी चलता है।
    - title: vs. open-source tools
      examples: Amical, OpenWhispr
      description: वो STT + paste करते हैं। PerkySue में local LLM pipeline, text selection + voice instructions, Smart Focus और GUI widget भी है।
  privacy:
    section_title: Privacy
    items:
    - icon: 🔒
      title: Internet नहीं चाहिए
      description: सब कुछ तुम्हारी machine पर चलता है
    - icon: 🔇
      title: Audio कभी store नहीं होता
      description: RAM में capture, transcribe, तुरंत delete
    - icon: 👤
      title: Account नहीं चाहिए
      description: कोई sign-up नहीं, tracking नहीं, cookies नहीं
    - icon: 📂
      title: Open source
      description: हर line of code खुद देख सकते हो
  why_i_built_it:
    section_title: PerkySue क्यों बनाया
    paragraph_1: 'PerkySue एक personal productivity tool के रूप में शुरू हुआ — pitch deck के लिए नहीं, रोज़ ज़रूरत थी इसलिए बनाया। सालों तक software architecture और conversational platforms design करने के बाद एक pipeline में सब समेटना था: voice → local STT → local LLM → text inject जहाँ काम चल रहा हो।'
    paragraph_2: 'Code AI के साथ मिलकर बनाया: इस project में AI programming assistants के साथ लगातार collaboration था। Local pipeline complex है। मज़ेदार बात — आज PerkySue मुझे खुद अपना code लिखने में help करता है, बिना मेरी आवाज़ या data cloud पर भेजे।'
