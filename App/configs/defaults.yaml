# ============================================================
# PerkySue — System Defaults
# ============================================================
# These are the factory default settings. DO NOT EDIT THIS FILE.
# To customize, edit Data/Configs/config.yaml instead.
# Your settings override these defaults.
# ============================================================

# --- Speech-to-Text (STT) ---
stt:
  provider: "whisper"

  # Whisper model: tiny | base | small | medium | large-v3
  # tiny:     ~1 GB RAM, fast, OK for English
  # base:     ~1 GB RAM, good for single language
  # small:    ~2 GB RAM, good multi-language
  # medium:   ~5 GB RAM, very good multi-language (recommended)
  # large-v3: ~10 GB RAM, best, needs GPU
  model: "medium"

  # Language: "auto" for detection, or ISO code (fr, en, de, es...)
  language: "auto"

  # Device: "auto" | "cpu" | "cuda"
  device: "auto"

  # Compute type: "auto" | "float16" | "int8" | "float32"
  compute_type: "auto"

  # Optional: words to help Whisper recognize (comma-separated), e.g. "PerkySue, Sue", product names.
  # Passed as initial_prompt to faster-whisper (biases the first segment).
  initial_prompt: "PerkySue, Sue"

  # Long audio only: split into overlapping segments before Whisper (lower peak RAM; same GPU wall time ~ one pass).
  # 0 = disabled (default). Example: 28–35 when you often transcribe minutes-long clips (see chunk_min_audio_sec).
  chunk_length_sec: 0
  chunk_overlap_sec: 1.0
  chunk_min_audio_sec: 45.0

# --- Large Language Model (LLM) ---
llm:
  provider: "llamacpp"

  # GGUF model filename in Data/Models/LLM/ (empty = auto-detect)
  model: ""

  # GPU layers: -1 = all on GPU, 0 = CPU only
  n_gpu_layers: -1

  # --- Max INPUT (context) vs Max OUTPUT (tokens) — clearly separated ---
  # Max input (context): size in tokens of the context window the model can read.
  # 0 = auto by backend (CPU 2048, Vulkan 4096, NVIDIA 8192–16384). Override in Data/Configs/config.yaml.
  max_input_tokens: 4096
  # Legacy key (same as max_input_tokens); kept for compatibility.
  n_ctx: 4096

  # CPU threads (0 = auto)
  n_threads: 0

  # Temperature (0.0 = deterministic, 0.7 = creative)
  temperature: 0.3

  # Max output tokens: maximum new tokens per reply (same idea as Max input: 0 = Auto).
  # Auto scales with effective context (~n_ctx/3, capped so prompt+completion stay in window).
  # Set a positive number in config.yaml only if you want a fixed cap (e.g. 2048).
  max_output_tokens: 4096

  # HTTP read timeout (seconds) for llama-server mode: base wait for one completion; client adds extra time for very long system prompts. 120–360; raise on slow PCs or large TTS/Help prompts.
  request_timeout: 180

  # Thinking models (llama-server): off → --reasoning-budget 0; on → budget below (-1 = unlimited).
  thinking: off
  thinking_budget: 512
  # Pro Ask context window: number of latest Q/A kept verbatim before rolling summary cadence.
  # Allowed: 2 | 3 | 4 (default 4). Lower values reduce prompt size and summarize more often.
  answer_context_keep: 2
  # Pro only: when true, LLM exchanges from non-Ask modes are also mirrored into Chat history for follow-ups.
  inject_all_modes_in_chat: true

# --- Skin & Audio ---
skin:
  # Active skin: "Default" (built-in), "Sue", "Mike", or a folder name under Data/Skins/
  active: "Default"
  
  # Pro tier only: allow adding custom skins
  allow_custom: false

audio:
  volume: 1.0  # 0.0–1.0

  # Source STT (UI) : mic_only | system_only | mix — loopback Windows = PyAudioWPatch
  capture_mode: mic_only
  # Optional indices (sounddevice) ; loopback_device = sortie à écouter (alignement par nom avec PyAudioWPatch)
  mic_device: null
  loopback_device: null
  mix_mic_gain: 1.0
  mix_loopback_gain: 0.8
  
  # Technical parameters (normally auto-detected)
  sample_rate: 16000
  # Max seconds for one listening session before hard stop (GUI: Performance → Max listening duration).
  # 60–900 s; longer captures use more RAM during STT (whole buffer). Optional stt.chunk_* helps very long audio.
  max_duration: 120
  # Voice detection sensitivity preset — controls when PerkySue decides you stopped talking.
  # Values: quiet_room | normal | noisy (see table in docs / Settings).
  # quiet_room : sensitive — soft mics, headsets, whisper dictation.
  # normal     : balanced (default) — most setups.
  # noisy      : aggressive — loud environments, system mix, Voicemeeter.
  # You can also set a raw integer 0–3 (WebRTC VAD aggressiveness) for advanced override.
  vad_sensitivity: "normal"
  silence_timeout: 2.0

# --- Text-to-Speech (Pro, opt-in) — code in App/services/tts/ ; pip + ~1 GB model from Voice tab ---
tts:
  enabled: true
  auto_speak: true
  volume: 0.8
  speed: 1.0
  trigger_modes:
    - answer
    - help
    - improve
    - professional
    - translate
    - console
    - email
    - message
    - social
    - summarize
    - summarize_qa
    - genz
    - custom1
    - custom2
    - custom3
  default_voice: null
  # auto → OmniVoice when an NVIDIA GPU is detected (nvidia-smi), else Chatterbox
  engine: auto
  # OmniVoice (when engine: omnivoice) — see Voice tab
  omnivoice_mode: auto
  omnivoice_instruct: "female, neutral pitch"
  omnivoice_num_step: 32
  omnivoice_repo: "k2-fsa/OmniVoice"
  # User chose "Don't ask again" on the PyTorch CUDA install prompt (Voice tab).
  pytorch_cuda_offer_never: false
  # When Voice is ON (Pro): add payload layout instructions from App/configs/voice_modes.yaml and inject only <PS_PAYLOAD> content.
  voice_payload_enabled: true
  # If true, TTS also reads the injectable payload; default false (spoken wrapper only).
  read_aloud_payload: false
  # Advanced: force Chatterbox device via environment PERKYSUE_CHATTERBOX_DEVICE=cpu|cuda|mps (e.g. new NVIDIA GPUs where CUDA reports OK but synthesis is silent).

# --- Identity & Preferences ---
identity:
  # Optional: user's preferred display name (used in some LLM prompts, e.g. Alt+A / email signatures)
  name: ""
  # First language for UI greetings (Chat/Help welcome): "auto" or ISO code (en, fr, de, es, it, pt, nl, pl)
  first_language: "auto"

# --- Modes ---
modes:
  default: "transcribe"
  translate_target: "en"
  translate_source: "auto"

# --- Hotkeys ---
# Windows: RegisterHotKey — avoid alt+escape (reserved by Windows; registration often fails).
# stop_recording: alt+q plus Ctrl+Alt+q (AltGr) registered automatically (skip_altgr=False in orchestrator).
# User overrides: Data/Configs/config.yaml.
hotkeys:
  behavior: "toggle"

  transcribe: "alt+t"
  improve: "alt+i"
  professional: "alt+p"
  translate: "alt+l"
  console: "alt+c"
  email: "alt+m"
  message: "alt+d"
  social: "alt+x"
  summarize: "alt+s"
  genz: "alt+g"
  answer: "alt+a"
  help: "alt+h"
  custom1: "alt+v"
  custom2: "alt+b"
  custom3: "alt+n"
  # Stop recording / cancel LLM (global). Letter Q is free (S = Summarize). Do not use alt+escape.
  stop_recording: "alt+q"
  # Paste again the last PerkySue injectable result into the foreground window (not an LLM mode).
  reinject_last: "alt+r"

# --- Text Injection ---
injection:
  method: "clipboard"
  restore_clipboard: true
  delay_ms: 100
  # After auto-paste: wait this many seconds before restoring the user's previous clipboard,
  # only if the clipboard still holds the injected payload (see injector delayed restore).
  clipboard_restore_delay_sec: 5

# --- Feedback ---
feedback:
  sound_enabled: true
  notification_enabled: true
  console_output: true
  # Verbose LLM logs, raw TTS tags in UI/paste, Alt+A injection includes PreviousAnswersSummary (Settings → Advanced).
  debug_mode: false
