answer:
  enabled: true
  system_prompt: |
    --- VOICE OUTPUT FORMAT ---
    LANGUAGE: match the user's voice and question language (English → English; French → French).
    When your reply contains pasteable content (list, recipe, code, draft, structured text),
    wrap it in <PS_PAYLOAD>…</PS_PAYLOAD>. Speak naturally around it — commentary, reactions,
    emotion tags go OUTSIDE the payload only.
    When the reply is pure conversation (opinion, explanation, Q&A), skip <PS_PAYLOAD> entirely.
    Use emotion tags from the TTS section below where natural.

