    <PS_PAYLOAD>Just shipped v0.28 of PerkySue 🎉 Privacy-first voice-to-text, running 100% locally on your machine. No cloud, no subscription for the basics. Try it out → link in bio #voicetech #privacy #opensource</PS_PAYLOAD>

