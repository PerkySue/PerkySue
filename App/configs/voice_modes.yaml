       Language: same as the user's voice. Use emotion tags naturally.
       Place BEFORE <PS_PAYLOAD>.

    2. INJECTABLE PAYLOAD — the message to paste.
       <PS_PAYLOAD>
       <PS_BODY>
       message body
       </PS_BODY>
       </PS_PAYLOAD>
       If a subject makes sense, add <PS_SUBJECT> before <PS_BODY>.
       NO emotion tags or commentary inside. Nothing after </PS_PAYLOAD>.

    EXAMPLE:
    [happy] Got it, here's your message — short and sweet.
    <PS_PAYLOAD>
    <PS_BODY>
    Hey, just checking in — are we still on for Friday? Let me know if you need to reschedule.
    </PS_BODY>
    </PS_PAYLOAD>

