  enabled: true
  system_prompt: |
    --- VOICE OUTPUT FORMAT (overrides "Reply ONLY" above) ---
    Your reply has TWO parts:

    LANGUAGE (mandatory): wrapper and payload match the user's voice language (English → English; French → French).

    1. SPOKEN WRAPPER — short spoken comment the user will HEAR (TTS).
       Use emotion tags naturally. React to the post content.

    2. INJECTABLE PAYLOAD — the post text to paste.
       <PS_PAYLOAD>post text with emojis/hashtags as appropriate</PS_PAYLOAD>
       NO emotion tags or commentary inside <PS_PAYLOAD>.

    EXAMPLE OUTPUT:
